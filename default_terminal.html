<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>~/projects/pi-ru</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

:root{
    --bg: rgb(20,20,25);
    --bg-soft: rgb(27,27,34);
    --panel-bg: rgba(255,255,255,0.06);
    --panel-bg-hover: rgba(255,255,255,0.10);
    --panel-border: rgba(255,255,255,0.14);
    --panel-border-strong: rgba(255,255,255,0.22);
    --text-main: rgba(255,255,255,0.96);
    --text-soft: rgba(255,255,255,0.70);
    --text-dim: rgba(255,255,255,0.42);
    --accent: rgba(255,255,255,0.88);
    --danger: #ff8a8a;
    --radius: 8px;
    --control-h: 28px;
    --dock-right-gap: 4px;
}

*{
    box-sizing: border-box;
}

html, body{
    margin:0;
    padding:0;
    height:100dvh;
    background:var(--bg);
    color:var(--text-main);
    font-family:'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-style:normal;
    font-weight:400;
    overflow:hidden;
}

body{
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
}

#chatMessages{
    position:fixed;
    top:10px;
    left:10px;
    right:10px;
    bottom:112px;
    overflow-y:auto;
    padding:8px 4px 8px 2px;
}

#messageInput{
    position:fixed;
    left:10px;
    right:10px;
    bottom:42px;
    width:auto;
    max-height:120px;
    min-height:38px;
    height:38px;
    padding:9px 72px 9px 12px;
    background:transparent;
    color:var(--text-main);
    border:none;
    border-top:1px solid rgba(255,255,255,0.18);
    border-bottom:1px solid rgba(255,255,255,0.18);
    outline:none;
    resize:none;
    overflow-y:auto;
    font-family:'Inter', system-ui, sans-serif;
    font-size:14px;
    line-height:1.4;
    letter-spacing:0.01em;
}

#messageInput::placeholder{
    color:rgba(255,255,255,0.24);
    font-style:normal;
}

#sendLabel{
    position:fixed;
    right:18px;
    bottom:52px;
    color:rgba(255,255,255,0.62);
    font-size:13px;
    font-weight:500;
    letter-spacing:0.02em;
    cursor:pointer;
    user-select:none;
    transition:color 0.2s, opacity 0.2s, transform 0.2s;
}

#sendLabel:hover{
    color:rgba(255,255,255,0.92);
}

#sendLabel.thinking{
    color:rgba(255,255,255,0.96);
    animation:pulseSend 1s ease-in-out infinite;
}

@keyframes pulseSend{
    0% { opacity:.45; transform:translateY(0); }
    50% { opacity:1; transform:translateY(-1px); }
    100% { opacity:.45; transform:translateY(0); }
}

#bottomBar{
    position:fixed;
    left:10px;
    right:10px;
    bottom:10px;
    min-height:24px;
    display:flex;
    align-items:center;
    gap:8px;
    z-index:20;
}

#pathDisplay{
    flex:0 0 auto;
    margin-right:auto;
    font-size:12px;
    line-height:1;
    opacity:0.38;
    white-space:nowrap;
    letter-spacing:0.01em;
}

#rightControls{
    margin-left:auto;
    min-width:0;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:8px;
}

#adminControls{
    display:none;
    align-items:center;
    justify-content:flex-end;
    gap:6px;
    min-width:0;
    flex:0 1 auto;
    overflow-x:auto;
    scrollbar-width:none;
}

#adminControls::-webkit-scrollbar{
    display:none;
}

#adminControls select,
#adminControls button{
    height:var(--control-h);
    margin:0;
    border-radius:7px;
    border:1px solid var(--panel-border);
    background:var(--panel-bg);
    color:var(--text-main);
    font-family:'Inter', system-ui, sans-serif;
    font-size:11px;
    font-weight:500;
    letter-spacing:0.01em;
    white-space:nowrap;
    transition:background 0.18s, border-color 0.18s, opacity 0.18s, transform 0.18s;
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
}

#adminControls button{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:0 10px;
    line-height:1;
    cursor:pointer;
    min-width:56px;
}

#adminControls button:hover,
#adminControls select:hover{
    background:var(--panel-bg-hover);
    border-color:var(--panel-border-strong);
}

#adminControls button:active{
    transform:translateY(1px);
}

#adminControls select{
    min-width:108px;
    padding:0 28px 0 10px;
    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
    line-height:var(--control-h);
    background-image:
        linear-gradient(45deg, transparent 50%, rgba(255,255,255,0.72) 50%),
        linear-gradient(135deg, rgba(255,255,255,0.72) 50%, transparent 50%);
    background-position:
        calc(100% - 14px) 11px,
        calc(100% - 9px) 11px;
    background-size:5px 5px, 5px 5px;
    background-repeat:no-repeat;
}

#clearAllBtn{
    min-width:72px;
}

#modelDock{
    position:relative;
    flex:0 0 auto;
    margin-left:2px;
}

#modelCurrent{
    font-size:11px;
    font-weight:500;
    line-height:1.2;
    opacity:0.68;
    text-align:right;
    padding-right:var(--dock-right-gap);
    cursor:pointer;
    user-select:none;
    letter-spacing:0.01em;
}

#modelCurrent.admin-clickable{
    cursor:pointer;
}

#modelDropdown{
    display:none;
    position:absolute;
    right:0;
    bottom:100%;
    margin-bottom:8px;
    min-width:180px;
    max-width:320px;
    max-height:calc(100dvh - 90px);
    overflow-y:auto;
    padding:6px 0;
    background:rgba(10,10,14,0.82);
    border:1px solid rgba(255,255,255,0.10);
    border-radius:10px;
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    z-index:40;
    white-space:nowrap;
}

.model-option{
    position:relative;
    padding:8px 12px 8px 12px;
    color:rgba(255,255,255,0.74);
    font-size:11px;
    font-family:'Inter', system-ui, sans-serif;
    font-weight:500;
    letter-spacing:0.01em;
    text-align:right;
    cursor:pointer;
    overflow:hidden;
    text-overflow:ellipsis;
    transition:background 0.18s, color 0.18s;
}

.model-option:hover{
    background:rgba(255,255,255,0.06);
    color:rgba(255,255,255,0.95);
}

.model-option.active{
    background:rgba(255,255,255,0.10);
    color:rgba(255,255,255,0.98);
}

.model-option.active::after{
    content:'';
    position:absolute;
    top:6px;
    bottom:6px;
    right:0;
    width:2px;
    border-radius:2px;
    background:rgba(255,255,255,0.28);
}

.msgWrap{
    margin-bottom:6px;
}

.msgWrap.adminDeletable{
    cursor:pointer;
}

.msgWrap.adminDeletable:hover{
    outline:1px dashed rgba(255,255,255,0.16);
    outline-offset:2px;
}

.msg{
    margin:0;
    line-height:1.5;
    letter-spacing:0.01em;
    word-break:break-word;
    white-space:pre-wrap;
    font-size:14px;
    opacity:0.32;
}

.msg.assistant{
    opacity:1;
    color:#f5f7fb;
}

.msg.user{
    opacity:0.46;
    font-size:12px;
}

#fullscreenZone{
    position:fixed;
    top:6px;
    right:10px;
    width:42px;
    height:42px;
    z-index:100;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    opacity:0.24;
}

#fullscreenZone span{
    font-size:10px;
    font-weight:500;
    letter-spacing:0.04em;
    color:rgba(255,255,255,0.28);
}

@media (max-width:720px){
    :root{
        --control-h: 26px;
    }

    #chatMessages{
        bottom:108px;
    }

    #messageInput{
        bottom:40px;
        min-height:36px;
        height:36px;
        padding:8px 64px 8px 10px;
        font-size:13px;
    }

    #sendLabel{
        right:16px;
        bottom:50px;
        font-size:12px;
    }

    #bottomBar{
        gap:6px;
        align-items:center;
    }

    #pathDisplay{
        font-size:11px;
        max-width:86px;
        overflow:hidden;
        text-overflow:ellipsis;
    }

    #rightControls{
        gap:6px;
        max-width:calc(100vw - 112px);
    }

    #adminControls{
        gap:4px;
    }

    #adminControls select,
    #adminControls button{
        font-size:10px;
    }

    #adminControls button{
        min-width:52px;
        padding:0 8px;
    }

    #adminControls select{
        min-width:94px;
        padding:0 24px 0 8px;
        background-position:
            calc(100% - 12px) 10px,
            calc(100% - 8px) 10px;
    }

    #clearAllBtn{
        min-width:66px;
    }

    #modelCurrent{
        font-size:10px;
    }

    #modelDropdown{
        max-width:88vw;
    }

    .msg{
        font-size:13px;
    }

    .msg.user{
        font-size:11px;
    }
}

::-webkit-scrollbar{
    width:8px;
    height:8px;
}

::-webkit-scrollbar-track{
    background:rgb(15,15,20);
}

::-webkit-scrollbar-thumb{
    background:rgb(44,44,56);
    border-radius:4px;
}

*{
    scrollbar-width:thin;
    scrollbar-color:rgb(44,44,56) rgb(15,15,20);
}
</style>
</head>
<body>

<div id="chatMessages"></div>
<textarea id="messageInput" rows="1" placeholder="Type message..."></textarea>
<div id="sendLabel">Send</div>

<div id="bottomBar">
  <div id="pathDisplay">~/projects/pi-ru</div>

  <div id="rightControls">
    <div id="adminControls">
      <select id="sessionSelect"></select>
      <button id="undoBtn" type="button">undo</button>
      <button id="clearBtn" type="button">clear</button>
      <button id="clearAllBtn" type="button">clear ALL</button>
      <button id="refreshBtn" type="button">refresh</button>
    </div>

    <div id="modelDock">
      <div id="modelCurrent">Loading...</div>
      <div id="modelDropdown"></div>
    </div>
  </div>
</div>

<div id="fullscreenZone"><span>FULL</span></div>

<script>
const rawAlias = location.search.length > 1 ? decodeURIComponent(location.search.slice(1)) : '';
const ADMIN_HEADER = rawAlias;

const chatDiv = document.getElementById('chatMessages');
const input = document.getElementById('messageInput');
const sendLabel = document.getElementById('sendLabel');
const pathDisplay = document.getElementById('pathDisplay');
const fsZone = document.getElementById('fullscreenZone');

const adminControls = document.getElementById('adminControls');
const sessionSelect = document.getElementById('sessionSelect');
const undoBtn = document.getElementById('undoBtn');
const clearBtn = document.getElementById('clearBtn');
const clearAllBtn = document.getElementById('clearAllBtn');
const refreshBtn = document.getElementById('refreshBtn');

const modelCurrent = document.getElementById('modelCurrent');
const modelDropdown = document.getElementById('modelDropdown');

let adminMode = false;
let currentSession = 'default';
let currentModel = {
  provider: 'groq',
  model: 'llama-3.1-8b-instant',
  label: 'Groq · Llama 3.1 8B (fast/free)'
};
let models = [];
let poller = null;
let isSending = false;

function shortenLabel(provider, name) {
  let p = provider.toLowerCase();
  if (p === 'openrouter') p = 'OR';
  if (p === 'meta-llama') p = 'ml';
  return `${p}: ${name}`;
}

function setThinking(v) {
  sendLabel.classList.toggle('thinking', !!v);
  sendLabel.textContent = v ? '...' : 'Send';
}

function api(method, url, data=null, admin=false) {
  const headers = {'Content-Type': 'application/json'};
  if (admin) headers['X-Admin-Alias'] = ADMIN_HEADER;

  return fetch(url, {
    method,
    headers,
    body: data ? JSON.stringify(data) : null
  }).then(async (res) => {
    const payload = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(payload.error || ('HTTP ' + res.status));
    return payload;
  });
}

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}

function renderHistory(items) {
  chatDiv.innerHTML = '';
  if (!items || !items.length) return;

  for (const item of items) {
    const wrap = document.createElement('div');
    wrap.className = 'msgWrap' + (adminMode ? ' adminDeletable' : '');
    if (item.id) wrap.dataset.id = item.id;

    const msg = document.createElement('div');
    const isUser = item.role === 'user';
    msg.className = 'msg ' + (isUser ? 'user' : 'assistant');
    msg.textContent = item.message || item.content || '';
    wrap.appendChild(msg);

    if (adminMode && item.id) {
      wrap.title = 'Double click to delete';
      wrap.ondblclick = async () => {
        try {
          await api('POST', '/admin/delete_message', {id: item.id}, true);
          await loadHistory();
        } catch (e) {
          console.error(e);
        }
      };
    }

    chatDiv.appendChild(wrap);
  }

  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function renderModelDock() {
  modelCurrent.textContent = currentModel.label || (currentModel.provider + ' / ' + currentModel.model);
  modelDropdown.innerHTML = '';

  if (!adminMode) {
    modelCurrent.classList.remove('admin-clickable');
    modelDropdown.style.display = 'none';
    return;
  }

  modelCurrent.classList.add('admin-clickable');

  const sorted = [...models].sort((a, b) => {
    const order = { groq: 1, openrouter: 2 };
    const pa = a.provider.toLowerCase();
    const pb = b.provider.toLowerCase();
    if (order[pa] && order[pb]) return order[pa] - order[pb];
    if (order[pa]) return -1;
    if (order[pb]) return 1;
    return pa.localeCompare(pb);
  });

  for (const m of sorted) {
    const isActive = m.provider === currentModel.provider && m.model === currentModel.model;
    const el = document.createElement('div');
    el.className = 'model-option' + (isActive ? ' active' : '');
    el.textContent = shortenLabel(m.provider, m.name || m.model);
    el.onclick = async (e) => {
      e.stopPropagation();
      try {
        const data = await api('POST', '/admin/set_model', {
          provider: m.provider,
          model: m.model
        }, true);

        currentModel = {
          provider: data.provider,
          model: data.model,
          label: data.label || shortenLabel(data.provider, data.model)
        };
        renderModelDock();
        modelDropdown.style.display = 'none';
      } catch (e2) {
        console.error(e2);
      }
    };
    modelDropdown.appendChild(el);
  }
}

async function syncGlobalModel() {
  try {
    const gm = await api('GET', '/global_model');
    currentModel = {
      provider: gm.provider,
      model: gm.model,
      label: gm.label || (gm.provider + ' / ' + gm.model)
    };
    renderModelDock();
  } catch (_) {}
}

async function loadModels() {
  try {
    const data = await api('GET', '/models');
    models = data.models || [];
  } catch (_) {
    models = [];
  }
}

async function loadPublic() {
  adminMode = false;
  adminControls.style.display = 'none';
  pathDisplay.textContent = '~/projects/pi-ru';
  await syncGlobalModel();
  await loadHistory();
}

async function loadAdmin() {
  adminMode = true;
  adminControls.style.display = 'flex';
  pathDisplay.textContent = '~/projects/pi-ru';

  const state = await api('GET', '/admin/state', null, true);
  await loadModels();

  currentModel = state.global_model || currentModel;
  currentSession = localStorage.getItem('pi_admin_target_session') || 'private';
  if (!state.sessions.includes(currentSession)) {
    currentSession = state.sessions.includes('private') ? 'private' : (state.sessions[0] || 'default');
  }

  sessionSelect.innerHTML = '';
  for (const s of state.sessions) {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    if (s === currentSession) opt.selected = true;
    sessionSelect.appendChild(opt);
  }

  renderModelDock();
  await loadHistory();
}

async function loadHistory() {
  if (adminMode) {
    const data = await api('POST', '/admin/history', {session: currentSession}, true);
    renderHistory(data.history || []);
  } else {
    const data = await api('POST', '/history', {});
    renderHistory(data.history || []);
  }
}

function showError(msg) {
  const wrap = document.createElement('div');
  wrap.className = 'msgWrap';
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg assistant';
  msgDiv.style.color = '#ff8a8a';
  msgDiv.style.whiteSpace = 'pre-wrap';
  msgDiv.textContent = 'Ошибка: ' + msg;
  wrap.appendChild(msgDiv);
  chatDiv.appendChild(wrap);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isSending) return;

  isSending = true;
  input.value = '';
  autoResize();
  setThinking(true);
  sendLabel.style.pointerEvents = 'none';

  try {
    if (adminMode) {
      const data = await api('POST', '/admin/chat', {
        session: currentSession,
        message: text
      }, true);

      await loadHistory();
      await syncGlobalModel();

      if (data.changed) setTimeout(() => location.reload(), 250);
    } else {
      const data = await api('POST', '/chat', { message: text });
      await loadHistory();
      await syncGlobalModel();
      if (data.changed) setTimeout(() => location.reload(), 250);
    }
  } catch (e) {
    console.error(e);
    showError(e.message);
  } finally {
    isSending = false;
    sendLabel.style.pointerEvents = '';
    setThinking(false);
  }
}

function startPolling() {
  if (poller) clearInterval(poller);
  poller = setInterval(async () => {
    try {
      await loadHistory();
      await syncGlobalModel();
    } catch (_) {}
  }, 2500);
}

sendLabel.onclick = sendMessage;

input.addEventListener('input', autoResize);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sessionSelect.addEventListener('change', async () => {
  currentSession = sessionSelect.value;
  localStorage.setItem('pi_admin_target_session', currentSession);
  await loadHistory();
});

undoBtn.onclick = async () => {
  try {
    await api('POST', '/admin/undo', {session: currentSession}, true);
    await loadHistory();
    location.reload();
  } catch (e) {
    console.error(e);
  }
};

clearBtn.onclick = async () => {
  try {
    await api('POST', '/admin/clear_session', {session: currentSession}, true);
    await loadHistory();
  } catch (e) {
    console.error(e);
  }
};

clearAllBtn.onclick = async () => {
  try {
    await api('POST', '/admin/clear_all_histories', {}, true);
    await loadHistory();
  } catch (e) {
    console.error(e);
  }
};

refreshBtn.onclick = () => location.reload();

modelCurrent.onclick = (e) => {
  e.stopPropagation();
  if (!adminMode) return;
  const willOpen = modelDropdown.style.display !== 'block';
  if (willOpen) {
    modelDropdown.style.display = 'block';
    modelDropdown.scrollTop = 0;
  } else {
    modelDropdown.style.display = 'none';
  }
};

document.addEventListener('click', () => {
  modelDropdown.style.display = 'none';
});

fsZone.addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
});

(async function init() {
  try {
    if (rawAlias.includes('-admin-')) {
      await loadAdmin();
    } else {
      await loadPublic();
    }

    startPolling();
    autoResize();
    input.focus();
  } catch (e) {
    console.error(e);
    chatDiv.innerHTML = '';
    showError('Ошибка запуска интерфейса: ' + (e.message || 'Неизвестная ошибка'));
  }
})();
</script>
</body>
</html>
