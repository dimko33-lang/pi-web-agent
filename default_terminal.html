<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>~/projects/pi-ru</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap');

body{
    margin:0;
    padding:0;
    height:100dvh;
    background:rgb(20,40,76);
    color:#fff;
    font-family:'Cormorant Garamond',Georgia,serif;
    font-weight:300;
    font-style:italic;
    overflow:hidden;
}

#chatMessages{
    position:fixed;
    top:10px;
    left:10px;
    right:10px;
    bottom:115px;
    overflow-y:auto;
    padding:10px;
}

#messageInput{
    position:fixed;
    bottom:40px;
    left:10px;
    right:10px;
    max-height:120px;
    background:transparent;
    color:#fff;
    border:none;
    border-top:1px solid rgba(255,255,255,0.3);
    border-bottom:1px solid rgba(255,255,255,0.3);
    font-size:15px;
    letter-spacing:1.8px;
    padding:8px 12px;
    height:35px;
    min-height:35px;
    box-sizing:border-box;
    outline:none;
    resize:none;
    font-family:'Cormorant Garamond',Georgia,serif;
    font-weight:300;
    font-style:italic;
    line-height:1.4;
    overflow-y:auto;
}

#messageInput::placeholder{
    color:rgba(255,255,255,0.25);
    font-style:italic;
}

#sendLabel{
    position:fixed;
    bottom:46px;
    right:20px;
    color:rgba(255,255,255,0.6);
    font-size:20px;
    cursor:pointer;
    user-select:none;
    transition:color 0.2s, opacity 0.2s, transform 0.2s;
}

#sendLabel:hover{
    color:rgba(255,255,255,0.9);
}

#sendLabel.thinking{
    color:rgba(255,255,255,0.95);
    animation:pulseSend 1s ease-in-out infinite;
}

@keyframes pulseSend{
    0%   { opacity:.45; transform:translateY(0px); }
    50%  { opacity:1;   transform:translateY(-1px); }
    100% { opacity:.45; transform:translateY(0px); }
}

#bottomBar{
    position:fixed;
    left:10px;
    right:10px;
    bottom:12px;
    min-height:18px;
    display:flex;
    align-items:center;
    gap:10px;
    z-index:20;
}

#pathDisplay{
    font-size:16px;
    opacity:0.45;
    line-height:1;
    white-space:nowrap;
    flex:0 0 auto;
}

#adminControls{
    display:none;
    align-items:center;
    gap:6px;
    min-width:0;
    flex:1 1 auto;
    justify-content:center;
}

#adminControls select,
#adminControls button{
    background:rgba(255,255,255,0.08);
    color:#fff;
    border:1px solid rgba(255,255,255,0.18);
    border-radius:7px;
    padding:2px 6px;
    font-family:'Cormorant Garamond',Georgia,serif;
    font-size:11px;
    font-style:italic;
    line-height:1.1;
    height:24px;
}

#adminControls button{
    cursor:pointer;
}

#modelDock{
    position:relative;
    margin-left:auto;
    flex:0 0 auto;
    user-select:none;
    min-width:0;
}

#modelCurrent{
    font-size:12px;
    opacity:0.45;
    line-height:1;
    text-align:right;
    white-space:nowrap;
}

#modelCurrent.admin-clickable{
    cursor:pointer;
}

/* DROPDOWN — без рамки, полупрозрачный фон, blur, на всю высоту */
#modelDropdown{
    display:none;
    position:absolute;
    bottom:100%;
    right:0;
    background:rgba(20,40,76,0.96);
    backdrop-filter:blur(8px);
    padding:4px 0;
    z-index:40;
    white-space:nowrap;
    max-height:calc(100vh - 100px);
    overflow-y:auto;
    min-width:240px;
    border:none;
}

.model-option{
    padding:7px 12px;
    color:#fff;
    font-size:12px;
    cursor:pointer;
    text-align:right;
    white-space:nowrap;
    font-family:'Cormorant Garamond',Georgia,serif;
    font-weight:300;
    font-style:italic;
}
.model-option:hover{
    color:rgba(255,255,255,0.6);
}
.model-group-header{
    padding:5px 12px 2px 12px;
    color:rgba(255,255,255,0.5);
    font-size:10px;
    text-transform:uppercase;
    border-bottom:1px solid rgba(255,255,255,0.1);
    margin-top:4px;
    letter-spacing:1px;
}

#fullscreenZone{
    position:fixed;
    top:5px;
    right:8px;
    width:auto;
    height:auto;
    padding:4px 8px;
    z-index:100;
    cursor:pointer;
    opacity:0.3;
    border-radius:4px;
    transition:opacity 0.2s;
}
#fullscreenZone:hover{
    opacity:0.6;
}
#fullscreenZone span{
    font-size:10px;
    color:rgba(255,255,255,0.6);
    letter-spacing:0.5px;
    font-family:'Cormorant Garamond',Georgia,serif;
    font-style:italic;
}

::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:rgb(16,32,60)}
::-webkit-scrollbar-thumb{background:rgb(26,52,98);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgb(36,68,118)}
*{scrollbar-width:thin;scrollbar-color:rgb(26,52,98) rgb(16,32,60)}
</style>
</head>
<body>

<div id="chatMessages"></div>

<textarea id="messageInput" rows="1" placeholder="Type message..."></textarea>
<div id="sendLabel">Send</div>

<div id="bottomBar">
  <div id="pathDisplay">~/projects/pi-ru</div>

  <div id="adminControls">
    <select id="sessionSelect"></select>
    <button id="undoBtn" type="button">undo</button>
    <button id="clearBtn" type="button">clear</button>
    <button id="clearAllBtn" type="button">clear ALL</button>
    <button id="refreshBtn" type="button">refresh</button>
  </div>

  <div id="modelDock">
    <div id="modelCurrent">Loading...</div>
    <div id="modelDropdown"></div>
  </div>
</div>

<div id="fullscreenZone"><span>full screen</span></div>

<script>
const rawAlias = location.search.length > 1 ? decodeURIComponent(location.search.slice(1)) : '';
const ADMIN_HEADER = rawAlias;

const chatDiv = document.getElementById('chatMessages');
const input = document.getElementById('messageInput');
const sendLabel = document.getElementById('sendLabel');
const pathDisplay = document.getElementById('pathDisplay');
const fsZone = document.getElementById('fullscreenZone');

const adminControls = document.getElementById('adminControls');
const sessionSelect = document.getElementById('sessionSelect');
const undoBtn = document.getElementById('undoBtn');
const clearBtn = document.getElementById('clearBtn');
const clearAllBtn = document.getElementById('clearAllBtn');
const refreshBtn = document.getElementById('refreshBtn');

const modelCurrent = document.getElementById('modelCurrent');
const modelDropdown = document.getElementById('modelDropdown');

let adminMode = false;
let currentSession = 'default';
let currentModel = {
  provider: 'groq',
  model: 'llama-3.1-8b-instant',
  label: 'Groq · Llama 3.1 8B (fast/free)'
};
let models = [];
let poller = null;

function setThinking(v) {
  sendLabel.classList.toggle('thinking', !!v);
  sendLabel.textContent = v ? '...' : 'Send';
}

function api(method, url, data=null, admin=false) {
  const headers = {'Content-Type': 'application/json'};
  if (admin) headers['X-Admin-Alias'] = ADMIN_HEADER;

  return fetch(url, {
    method,
    headers,
    body: data ? JSON.stringify(data) : null
  }).then(async (res) => {
    const payload = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(payload.error || ('HTTP ' + res.status));
    return payload;
  });
}

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}

function renderHistory(items) {
  chatDiv.innerHTML = '';
  if (!items || !items.length) return;

  for (const item of items) {
    const wrap = document.createElement('div');
    wrap.className = 'msgWrap' + (adminMode ? ' adminDeletable' : '');
    if (item.id) wrap.dataset.id = item.id;

    const msg = document.createElement('div');
    const isUser = item.role === 'user';
    msg.className = 'msg ' + (isUser ? 'user' : 'assistant');
    msg.textContent = item.message || item.content || '';
    wrap.appendChild(msg);

    if (adminMode && item.id) {
      wrap.title = 'Double click to delete';
      wrap.ondblclick = async () => {
        try {
          await api('POST', '/admin/delete_message', {id: item.id}, true);
          await loadHistory();
        } catch (e) {
          console.error(e);
        }
      };
    }

    chatDiv.appendChild(wrap);
  }

  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function renderModelDock() {
  modelCurrent.textContent = currentModel.label || (currentModel.provider + ' / ' + currentModel.model);
  if (!adminMode) {
    modelCurrent.classList.remove('admin-clickable');
    return;
  }
  modelCurrent.classList.add('admin-clickable');
}

function renderModelDropdown() {
  if (!adminMode) return;
  modelDropdown.innerHTML = '';
  if (!models.length) {
    const div = document.createElement('div');
    div.className = 'model-option';
    div.textContent = 'No models';
    modelDropdown.appendChild(div);
    return;
  }

  const groups = {};
  for (const m of models) {
    const prov = m.provider || 'unknown';
    if (!groups[prov]) groups[prov] = [];
    groups[prov].push(m);
  }

  for (const [provider, items] of Object.entries(groups)) {
    const header = document.createElement('div');
    header.className = 'model-group-header';
    header.textContent = provider.toUpperCase();
    modelDropdown.appendChild(header);
    for (const item of items) {
      const opt = document.createElement('div');
      opt.className = 'model-option';
      opt.textContent = `${provider}: ${item.name}`;
      opt.onclick = (e) => {
        e.stopPropagation();
        api('POST', '/admin/set_model', {
          provider: item.provider,
          model: item.model
        }, true).then(data => {
          currentModel = {
            provider: data.provider,
            model: data.model,
            label: data.label || item.name
          };
          renderModelDock();
          modelDropdown.style.display = 'none';
        }).catch(console.error);
      };
      modelDropdown.appendChild(opt);
    }
  }
}

async function syncGlobalModel() {
  try {
    const gm = await api('GET', '/global_model');
    currentModel = {
      provider: gm.provider,
      model: gm.model,
      label: gm.label || (gm.provider + ' / ' + gm.model)
    };
    renderModelDock();
  } catch (_) {}
}

async function loadModels() {
  try {
    const data = await api('GET', '/models');
    models = data.models || [];
    renderModelDropdown();
  } catch (_) {
    models = [];
  }
}

async function loadPublic() {
  adminMode = false;
  adminControls.style.display = 'none';
  pathDisplay.textContent = '~/projects/pi-ru';
  await syncGlobalModel();
  await loadHistory();
}

async function loadAdmin() {
  adminMode = true;
  adminControls.style.display = 'flex';
  pathDisplay.textContent = '~/projects/pi-ru';

  const state = await api('GET', '/admin/state', null, true);
  await loadModels();

  currentModel = state.global_model || currentModel;
  currentSession = localStorage.getItem('pi_admin_target_session') || 'private';
  if (!state.sessions.includes(currentSession)) {
    currentSession = state.sessions.includes('private') ? 'private' : (state.sessions[0] || 'default');
  }

  sessionSelect.innerHTML = '';
  for (const s of state.sessions) {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    if (s === currentSession) opt.selected = true;
    sessionSelect.appendChild(opt);
  }

  renderModelDock();
  await loadHistory();
}

async function loadHistory() {
  if (adminMode) {
    const data = await api('POST', '/admin/history', {session: currentSession}, true);
    renderHistory(data.history || []);
  } else {
    const data = await api('POST', '/history', {});
    renderHistory(data.history || []);
  }
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  autoResize();
  setThinking(true);

  try {
    if (adminMode) {
      const data = await api('POST', '/admin/chat', {
        session: currentSession,
        message: text
      }, true);

      await loadHistory();
      await syncGlobalModel();

      if (data.changed) setTimeout(() => location.reload(), 250);
    } else {
      const data = await api('POST', '/chat', {message: text});

      await loadHistory();
      await syncGlobalModel();

      if (data.changed) setTimeout(() => location.reload(), 250);
    }
  } catch (e) {
    console.error(e);
  } finally {
    setThinking(false);
  }
}

function startPolling() {
  if (poller) clearInterval(poller);
  poller = setInterval(async () => {
    try {
      await loadHistory();
      await syncGlobalModel();
    } catch (_) {}
  }, 2500);
}

sendLabel.onclick = sendMessage;

input.addEventListener('input', autoResize);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sessionSelect.addEventListener('change', async () => {
  currentSession = sessionSelect.value;
  localStorage.setItem('pi_admin_target_session', currentSession);
  await loadHistory();
});

undoBtn.onclick = async () => {
  try {
    await api('POST', '/admin/undo', {session: currentSession}, true);
    await loadHistory();
    location.reload();
  } catch (e) {
    console.error(e);
  }
};

clearBtn.onclick = async () => {
  try {
    await api('POST', '/admin/clear_session', {session: currentSession}, true);
    await loadHistory();
  } catch (e) {
    console.error(e);
  }
};

clearAllBtn.onclick = async () => {
  try {
    await api('POST', '/admin/clear_all_histories', {}, true);
    await loadHistory();
  } catch (e) {
    console.error(e);
  }
};

refreshBtn.onclick = () => location.reload();

modelCurrent.onclick = (e) => {
  e.stopPropagation();
  if (!adminMode) return;
  renderModelDropdown();
  modelDropdown.style.display = modelDropdown.style.display === 'block' ? 'none' : 'block';
};

document.addEventListener('click', (e) => {
  if (!modelDropdown.contains(e.target) && e.target !== modelCurrent) {
    modelDropdown.style.display = 'none';
  }
});

fsZone.addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
});

(async function init() {
  try {
    if (rawAlias.includes('-admin-')) {
      await loadAdmin();
    } else {
      await loadPublic();
    }

    startPolling();
    autoResize();
    input.focus();
  } catch (e) {
    console.error(e);
    chatDiv.innerHTML = '';
  }
})();
</script>
</body>
</html>
