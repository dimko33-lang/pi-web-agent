<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>~/projects/pi-ru</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap');
:root{
    --glass-bg:rgba(255,255,255,0.08);
    --glass-bg-hover:rgba(255,255,255,0.12);
    --glass-border:rgba(255,255,255,0.18);
    --glass-border-strong:rgba(255,255,255,0.26);
    --dock-top-gap:10px;
    --dock-max-height:calc(100dvh - var(--dock-top-gap));
    --dock-right-gap:5px;
}
body{
    margin:0; padding:0; height:100dvh;
    background:rgb(20,40,76); color:#fff;
    font-family:'Cormorant Garamond',Georgia,serif;
    font-weight:300; font-style:italic;
    overflow:hidden;
}
#chatMessages{
    position:fixed; top:10px; left:10px; right:10px; bottom:115px;
    overflow-y:auto; padding:10px;
}
#messageInput{
    position:fixed; bottom:40px; left:10px; right:10px; max-height:120px;
    background:transparent; color:#fff; border:none;
    border-top:1px solid rgba(255,255,255,0.3);
    border-bottom:1px solid rgba(255,255,255,0.3);
    font-size:15px; letter-spacing:1.8px; padding:8px 12px;
    height:35px; min-height:35px; box-sizing:border-box;
    outline:none; resize:none; line-height:1.4; overflow-y:auto;
}
#messageInput::placeholder{ color:rgba(255,255,255,0.25); font-style:italic; }
#sendLabel{
    position:fixed; bottom:46px; right:20px;
    color:rgba(255,255,255,0.6); font-size:20px; cursor:pointer;
    user-select:none; transition:color 0.2s, opacity 0.2s, transform 0.2s;
}
#sendLabel:hover{ color:rgba(255,255,255,0.9); }
#sendLabel.thinking{
    color:rgba(255,255,255,0.95);
    animation:pulseSend 1s ease-in-out infinite;
}
@keyframes pulseSend{
    0% { opacity:.45; transform:translateY(0px); }
    50% { opacity:1; transform:translateY(-1px); }
    100% { opacity:.45; transform:translateY(0px); }
}
#bottomBar{
    position:fixed; left:10px; right:10px; bottom:12px;
    min-height:24px; display:flex; align-items:center; gap:10px; z-index:20;
}
#pathDisplay{
    font-size:16px; opacity:0.45; line-height:1; white-space:nowrap; flex:0 0 auto;
}
#adminControls{
    display:none; align-items:center; gap:6px; min-width:0; flex:1 1 auto; justify-content:center;
}
#adminControls button, .control-trigger{
    display:inline-flex; align-items:center; justify-content:center;
    background:var(--glass-bg); color:#fff;
    border:1px solid var(--glass-border); border-radius:3px;
    padding:3px 8px; font-family:'Cormorant Garamond',Georgia,serif;
    font-size:11px; font-style:italic; line-height:22px; height:24px;
    letter-spacing:0.9px; backdrop-filter:blur(10px);
    transition:background 0.2s, border-color 0.2s, color 0.2s;
}
#adminControls button:hover, .control-trigger:hover, .control-trigger.active{
    background:var(--glass-bg-hover); border-color:var(--glass-border-strong);
}
#sessionDock, #modelDock{ position:relative; flex:0 0 auto; user-select:none; min-width:0; }
#sessionDock{ max-width:180px; }
#modelDock{ margin-left:auto; }
#sessionCurrent, #modelCurrent{
    line-height:22px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
#sessionCurrent{ min-width:86px; text-align:center; }
#modelCurrent{ font-size:12px; opacity:0.62; text-align:right; padding-right:var(--dock-right-gap); }
#sessionCurrent.admin-clickable, #modelCurrent.admin-clickable{ cursor:pointer; }
#sessionCurrent.admin-clickable:hover, #modelCurrent.admin-clickable:hover{ color:rgba(255,255,255,0.96); }
#modelCurrent.admin-clickable.active, #sessionCurrent.admin-clickable.active{ color:rgba(255,255,255,0.98); }
.glass-dropdown{
    display:none; position:absolute; bottom:100%;
    background:transparent; backdrop-filter:blur(4px);
    border:none; padding:6px 0 4px 0; z-index:40;
    white-space:nowrap; overflow-y:auto; max-height:var(--dock-max-height);
}
#sessionDropdown{ left:0; min-width:100%; width:max-content; max-width:260px; margin-bottom:6px; }
#modelDropdown{ right:0; width:max-content; max-width:360px; margin-bottom:6px; }
.glass-option{
    position:relative; padding:7px var(--dock-right-gap) 7px 10px;
    color:rgba(255,255,255,0.72); font-size:11px; cursor:pointer;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    font-family:'Cormorant Garamond',Georgia,serif; font-weight:300; font-style:italic;
    letter-spacing:0.8px; transition:background 0.18s, color 0.18s;
}
.glass-option:hover{
    background:linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 55%, rgba(255,255,255,0.07) 100%);
    color:rgba(255,255,255,0.9);
}
.glass-option.active{
    background:linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.04) 48%, rgba(255,255,255,0.1) 100%);
    color:rgba(255,255,255,0.96);
}
#sessionDropdown .glass-option{ text-align:center; padding-right:10px; }
#modelDropdown .glass-option{ text-align:right; }
/* остальные стили (msg, fullscreen и т.д.) оставлены без изменений */
.msgWrap{ margin-bottom:4px; }
.msgWrap.adminDeletable{ cursor:pointer; }
.msgWrap.adminDeletable:hover{ outline:1px dashed rgba(255,255,255,0.18); }
.msg{ margin:0; opacity:0.28; letter-spacing:1.8px; line-height:1.4; word-break:break-word; white-space:pre-wrap; }
.msg.assistant{ opacity:1; color:#f0f8f0; }
.msg.user{ opacity:0.45; font-size:0.8em; }
#fullscreenZone{
    position:fixed; top:3px; right:12px; width:50px; height:50px; z-index:100;
    display:flex; align-items:center; justify-content:center; cursor:pointer; opacity:0.3;
}
#fullscreenZone span{ font-size:11px; color:rgba(255,255,255,0.35); letter-spacing:1px; }
@media (max-width: 720px){
    #bottomBar{ gap:6px; align-items:center; }
    #pathDisplay{ font-size:12px; max-width:80px; overflow:hidden; }
    #adminControls{ gap:4px; justify-content:flex-start; overflow-x:auto; }
    #adminControls button, .control-trigger{ font-size:10px; padding:2px 6px; height:22px; line-height:20px; }
    #sessionDock{ max-width:132px; }
    #sessionCurrent{ min-width:72px; }
    #modelCurrent{ font-size:10px; max-width:120px; }
    #sessionDropdown{ max-width:78vw; }
    #modelDropdown{ max-width:92vw; }
}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:rgb(16,32,60)}
::-webkit-scrollbar-thumb{background:rgb(26,52,98);border-radius:4px}
*{scrollbar-width:thin;scrollbar-color:rgb(26,52,98) rgb(16,32,60)}
</style>
</head>
<body>

<div id="chatMessages"></div>
<textarea id="messageInput" rows="1" placeholder="Type message..."></textarea>
<div id="sendLabel">Send</div>

<div id="bottomBar">
  <div id="pathDisplay">~/projects/pi-ru</div>
  <div id="adminControls">
    <div id="sessionDock">
      <div id="sessionCurrent" class="control-trigger">session</div>
      <div id="sessionDropdown" class="glass-dropdown"></div>
    </div>
    <button id="undoBtn" type="button">undo</button>
    <button id="clearBtn" type="button">clear</button>
    <button id="clearAllBtn" type="button">clear ALL</button>
    <button id="refreshBtn" type="button">refresh</button>
  </div>
  <div id="modelDock">
    <div id="modelCurrent">Loading...</div>
    <div id="modelDropdown" class="glass-dropdown"></div>
  </div>
</div>

<div id="fullscreenZone"><span>full screen</span></div>

<script>
const rawAlias = location.search.length > 1 ? decodeURIComponent(location.search.slice(1)) : '';
const ADMIN_HEADER = rawAlias;
const IS_FILE_PROTOCOL = location.protocol === 'file:';
const FORCE_PREVIEW = rawAlias === 'preview-ui' || location.hash === '#preview-ui' || IS_FILE_PROTOCOL;

const chatDiv = document.getElementById('chatMessages');
const input = document.getElementById('messageInput');
const sendLabel = document.getElementById('sendLabel');
const pathDisplay = document.getElementById('pathDisplay');
const fsZone = document.getElementById('fullscreenZone');

const adminControls = document.getElementById('adminControls');
const sessionCurrent = document.getElementById('sessionCurrent');
const sessionDropdown = document.getElementById('sessionDropdown');
const modelCurrent = document.getElementById('modelCurrent');
const modelDropdown = document.getElementById('modelDropdown');

const undoBtn = document.getElementById('undoBtn');
const clearBtn = document.getElementById('clearBtn');
const clearAllBtn = document.getElementById('clearAllBtn');
const refreshBtn = document.getElementById('refreshBtn');

let adminMode = false;
let currentSession = 'default';
let currentModel = { provider: 'groq', model: 'llama-3.1-8b-instant', label: 'Groq · Llama 3.1 8B' };
let models = [];
let sessions = [];
let poller = null;

const previewSessions = ['private', 'work', 'test', 'archive'];
const previewModels = [ /* ... твои модели ... */ ];

function shortenLabel(provider, name) { /* твоя функция */ }

function setThinking(v) { /* ... */ }

function api(method, url, data=null, admin=false) { /* ... */ }

function autoResize() { /* ... */ }

/* ==================== УЛУЧШЕННЫЙ ДРОПДАУН ==================== */
function closeAllDropdowns() {
  modelDropdown.style.display = 'none';
  sessionDropdown.style.display = 'none';
  sessionCurrent.classList.remove('active');
  modelCurrent.classList.remove('active');
}

function toggleDropdown(dropdown, trigger) {
  const willOpen = dropdown.style.display !== 'block';
  closeAllDropdowns();
  if (willOpen) {
    dropdown.style.display = 'block';
    if (trigger) trigger.classList.add('active');
    if (dropdown === modelDropdown) dropdown.scrollTop = 0;
  }
}

/* ==================== РЕНДЕР СЕССИЙ ==================== */
function renderSessionDock() {
  sessionDropdown.innerHTML = '';
  if (!adminMode) {
    sessionCurrent.textContent = 'session';
    sessionCurrent.classList.remove('admin-clickable');
    return;
  }

  sessionCurrent.classList.add('admin-clickable');
  sessionCurrent.textContent = currentSession;
  sessionCurrent.title = currentSession;

  for (const s of sessions) {
    const el = document.createElement('div');
    el.className = 'glass-option' + (s === currentSession ? ' active' : '');
    el.textContent = s;
    el.onclick = async (e) => {
      e.stopPropagation();
      currentSession = s;
      localStorage.setItem('pi_admin_target_session', currentSession);
      renderSessionDock();
      closeAllDropdowns();

      if (FORCE_PREVIEW) {
        // preview-уведомление
        const msg = document.createElement('div');
        msg.className = 'msg assistant';
        msg.textContent = `Сессия изменена на «${s}» (preview)`;
        chatDiv.appendChild(msg);
        chatDiv.scrollTop = chatDiv.scrollHeight;
      } else {
        await loadHistory();
      }
    };
    sessionDropdown.appendChild(el);
  }
}

/* ==================== РЕНДЕР МОДЕЛЕЙ (оставлен без изменений) ==================== */
function renderModelDock() { /* ... твой код ... */ }

/* остальные функции (loadAdmin, loadPublic, loadHistory, sendMessage и т.д.) — без изменений */

async function loadAdmin() {
  adminMode = true;
  adminControls.style.display = 'flex';
  pathDisplay.textContent = '~/projects/pi-ru';

  const state = await api('GET', '/admin/state', null, true);
  await loadModels();

  currentModel = state.global_model || currentModel;
  sessions = state.sessions || [];
  currentSession = localStorage.getItem('pi_admin_target_session') || 'private';
  if (!sessions.includes(currentSession)) {
    currentSession = sessions.includes('private') ? 'private' : (sessions[0] || 'default');
  }

  renderSessionDock();
  renderModelDock();
  await loadHistory();
}

/* ... остальные функции init, polling и т.д. ... */

(async function init() {
  try {
    if (FORCE_PREVIEW) {
      adminMode = true;
      adminControls.style.display = 'flex';
      pathDisplay.textContent = '~/projects/pi-ru · preview';
      sessions = previewSessions;
      models = previewModels;
      currentSession = localStorage.getItem('pi_admin_target_session') || sessions[0];
      renderSessionDock();
      renderModelDock();
      renderHistory([{role:'assistant', content:'Preview-режим активен. Переключение сессий работает!'}]);
    } else if (rawAlias.includes('-admin-')) {
      await loadAdmin();
    } else {
      await loadPublic();
    }
    startPolling();
    autoResize();
    input.focus();
  } catch (e) {
    console.error(e);
  }
})();
</script>
</body>
</html>
