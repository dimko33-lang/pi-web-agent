<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>~/projects/pi-ru</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap');

body{
    margin:0;
    padding:0;
    height:100dvh;
    background:rgb(20,40,76);
    color:#fff;
    font-family:'Cormorant Garamond',Georgia,serif;
    font-weight:300;
    font-style:italic;
    overflow:hidden;
}

#chatMessages{
    position:fixed;
    top:10px;
    left:10px;
    right:10px;
    bottom:115px;
    overflow-y:auto;
    padding:10px;
}

#messageInput{
    position:fixed;
    bottom:40px;
    left:10px;
    right:10px;
    max-height:120px;
    background:transparent;
    color:#fff;
    border:none;
    border-top:1px solid rgba(255,255,255,0.3);
    border-bottom:1px solid rgba(255,255,255,0.3);
    font-size:15px;
    letter-spacing:1.8px;
    padding:8px 12px;
    height:35px;
    min-height:35px;
    box-sizing:border-box;
    outline:none;
    resize:none;
    font-family:'Cormorant Garamond',Georgia,serif;
    font-weight:300;
    font-style:italic;
    line-height:1.4;
    overflow-y:auto;
}

#messageInput::placeholder{
    color:rgba(255,255,255,0.25);
    font-style:italic;
}

#sendLabel{
    position:fixed;
    bottom:46px;
    right:20px;
    color:rgba(255,255,255,0.6);
    font-size:20px;
    cursor:pointer;
    user-select:none;
    transition:color 0.2s, opacity 0.2s, transform 0.2s;
}

#sendLabel:hover{
    color:rgba(255,255,255,0.9);
}

#sendLabel.thinking{
    color:rgba(255,255,255,0.95);
    animation:pulseSend 1s ease-in-out infinite;
}

@keyframes pulseSend{
    0% { opacity:.45; transform:translateY(0px); }
    50% { opacity:1; transform:translateY(-1px); }
    100% { opacity:.45; transform:translateY(0px); }
}

#bottomBar{
    position:fixed;
    left:10px;
    right:10px;
    bottom:12px;
    min-height:18px;
    display:flex;
    align-items:center;
    gap:10px;
    z-index:20;
}

#pathDisplay{
    font-size:16px;
    opacity:0.45;
    line-height:1;
    white-space:nowrap;
    flex:0 0 auto;
}

#adminControls{
    display:none;
    align-items:center;
    gap:6px;
    min-width:0;
    flex:1 1 auto;
    justify-content:center;
}

#adminControls select,
#adminControls button{
    background:rgba(255,255,255,0.08);
    color:#fff;
    border:1px solid rgba(255,255,255,0.18);
    border-radius:7px;
    padding:2px 6px;
    font-family:'Cormorant Garamond',Georgia,serif;
    font-size:11px;
    font-style:italic;
    line-height:1.1;
    height:24px;
}

#adminControls button{
    cursor:pointer;
}

#modelDock{
    position:relative;
    margin-left:auto;
    flex:0 0 auto;
    user-select:none;
    min-width:0;
}

#modelCurrent{
    font-size:12px;
    opacity:0.45;
    line-height:1;
    text-align:right;
    white-space:nowrap;
    cursor:pointer;
    padding-right:5px;
}

#modelCurrent.admin-clickable{
    cursor:pointer;
}

#modelDropdown{
    display:none;
    position:absolute;
    bottom:100%;
    right:0;
    background:transparent;
    backdrop-filter:blur(4px);
    padding:0 0 4px 0;
    z-index:40;
    white-space:nowrap;
    max-height:calc(100vh - 8px);
    overflow-y:auto;
    border:none;
    width:fit-content;
    max-width:360px;
}

.model-option{
    padding:6px 6px 6px 8px;
    color:#fff;
    font-size:11px;
    cursor:pointer;
    text-align:right;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    font-family:'Cormorant Garamond',Georgia,serif;
    font-weight:300;
    font-style:italic;
}

.model-option:hover{
    color:rgba(255,255,255,0.6);
}

.msgWrap{
    margin-bottom:4px;
}

.msgWrap.adminDeletable{
    cursor:pointer;
}

.msgWrap.adminDeletable:hover{
    outline:1px dashed rgba(255,255,255,0.18);
}

.msg{
    margin:0;
    opacity:0.28;
    letter-spacing:1.8px;
    line-height:1.4;
    word-break:break-word;
    white-space:pre-wrap;
}

.msg.assistant{
    opacity:1;
    color:#f0f8f0;
}

.msg.user{
    opacity:0.45;
    font-size:0.8em;
}

#fullscreenZone{
    position:fixed;
    top:3px;
    right:12px;
    width:50px;
    height:50px;
    z-index:100;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    opacity:0.3;
}

#fullscreenZone span{
    font-size:11px;
    color:rgba(255,255,255,0.35);
    letter-spacing:1px;
}

@media (max-width: 720px){
    #bottomBar{ gap:6px; align-items:flex-end; }
    #pathDisplay{ font-size:12px; max-width:80px; overflow:hidden; }
    #adminControls{ gap:4px; justify-content:flex-start; overflow-x:auto; scrollbar-width:none; }
    #adminControls::-webkit-scrollbar{ display:none; }
    #adminControls select, #adminControls button{ font-size:10px; padding:2px 4px; height:22px; }
    #modelCurrent{ font-size:10px; max-width:120px; overflow:hidden; text-overflow:ellipsis; }
    #modelDropdown{ max-width:92vw; }
}

::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:rgb(16,32,60)}
::-webkit-scrollbar-thumb{background:rgb(26,52,98);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgb(36,68,118)}
*{scrollbar-width:thin;scrollbar-color:rgb(26,52,98) rgb(16,32,60)}
</style>
</head>
<body>

<div id="chatMessages"></div>
<textarea id="messageInput" rows="1" placeholder="Type message..."></textarea>
<div id="sendLabel">Send</div>

<div id="bottomBar">
  <div id="pathDisplay">~/projects/pi-ru</div>
  <div id="adminControls">
    <select id="sessionSelect"></select>
    <button id="undoBtn" type="button">undo</button>
    <button id="clearBtn" type="button">clear</button>
    <button id="clearAllBtn" type="button">clear ALL</button>
    <button id="refreshBtn" type="button">refresh</button>
  </div>
  <div id="modelDock">
    <div id="modelCurrent">Loading...</div>
    <div id="modelDropdown"></div>
  </div>
</div>

<div id="fullscreenZone"><span>full screen</span></div>

<script>
const rawAlias = location.search.length > 1 ? decodeURIComponent(location.search.slice(1)) : '';
const ADMIN_HEADER = rawAlias;

const chatDiv = document.getElementById('chatMessages');
const input = document.getElementById('messageInput');
const sendLabel = document.getElementById('sendLabel');
const pathDisplay = document.getElementById('pathDisplay');
const fsZone = document.getElementById('fullscreenZone');

const adminControls = document.getElementById('adminControls');
const sessionSelect = document.getElementById('sessionSelect');
const undoBtn = document.getElementById('undoBtn');
const clearBtn = document.getElementById('clearBtn');
const clearAllBtn = document.getElementById('clearAllBtn');
const refreshBtn = document.getElementById('refreshBtn');

const modelCurrent = document.getElementById('modelCurrent');
const modelDropdown = document.getElementById('modelDropdown');

let adminMode = false;
let currentSession = 'default';
let currentModel = { provider: 'groq', model: 'llama-3.1-8b-instant', label: 'Groq · Llama 3.1 8B' };
let models = [];

// Сокращение длинных названий
function shortenLabel(provider, name) {
  let p = provider.toLowerCase();
  if (p === 'openrouter') p = 'OR';
  if (p === 'meta-llama') p = 'ml';

  let shortName = name
    .replace(/Google Banana 2 \(Gemini/gi, 'Gemini')
    .replace(/Gemini 3\.1 Flash, Image, Preview/gi, 'Gemini 3.5 Flash')
    .replace(/Gemini 2\.5 Flash/gi, 'Gemini 2.5 Flash');

  return `${p}: ${shortName}`;
}

function renderModelDock() {
  modelCurrent.textContent = currentModel.label || (currentModel.provider + ' / ' + currentModel.model);
  modelDropdown.innerHTML = '';

  if (!adminMode) {
    modelCurrent.classList.remove('admin-clickable');
    modelDropdown.style.display = 'none';
    return;
  }

  modelCurrent.classList.add('admin-clickable');

  for (const m of models) {
    const el = document.createElement('div');
    el.className = 'model-option';
    el.textContent = shortenLabel(m.provider, m.name || m.model);
    el.title = `${m.provider}: ${m.name || m.model}`; // полное название при наведении
    el.onclick = async (e) => {
      e.stopPropagation();
      try {
        const data = await api('POST', '/admin/set_model', {
          provider: m.provider,
          model: m.model
        }, true);
        currentModel = {
          provider: data.provider,
          model: data.model,
          label: data.label || shortenLabel(data.provider, data.model)
        };
        renderModelDock();
        modelDropdown.style.display = 'none';
      } catch (e2) { console.error(e2); }
    };
    modelDropdown.appendChild(el);
  }
}

// ==================== остальной код без изменений ====================
function setThinking(v) { sendLabel.classList.toggle('thinking', !!v); sendLabel.textContent = v ? '...' : 'Send'; }

function api(method, url, data=null, admin=false) {
  const headers = {'Content-Type': 'application/json'};
  if (admin) headers['X-Admin-Alias'] = ADMIN_HEADER;
  return fetch(url, { method, headers, body: data ? JSON.stringify(data) : null })
    .then(async res => {
      const payload = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(payload.error || 'HTTP ' + res.status);
      return payload;
    });
}

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}

function renderHistory(items) { /* ... твой оригинальный код без изменений ... */ 
  chatDiv.innerHTML = '';
  if (!items || !items.length) return;
  for (const item of items) {
    const wrap = document.createElement('div');
    wrap.className = 'msgWrap' + (adminMode ? ' adminDeletable' : '');
    if (item.id) wrap.dataset.id = item.id;
    const msg = document.createElement('div');
    const isUser = item.role === 'user';
    msg.className = 'msg ' + (isUser ? 'user' : 'assistant');
    msg.textContent = item.message || item.content || '';
    wrap.appendChild(msg);
    if (adminMode && item.id) {
      wrap.title = 'Double click to delete';
      wrap.ondblclick = async () => {
        try { await api('POST', '/admin/delete_message', {id: item.id}, true); await loadHistory(); } catch(e){}
      };
    }
    chatDiv.appendChild(wrap);
  }
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

// ... (все остальные функции loadAdmin, loadPublic, loadModels, loadHistory, sendMessage, startPolling и т.д. остаются точно как в твоей последней версии)

async function loadModels() {
  try {
    const data = await api('GET', '/models');
    models = data.models || [];
  } catch (_) { models = []; }
}

// ... остальной JS (init, listeners и т.д.) точно как был у тебя

(async function init() {
  try {
    if (rawAlias.includes('-admin-')) {
      await loadAdmin();
    } else {
      await loadPublic();
    }
    startPolling();
    autoResize();
    input.focus();
  } catch (e) {
    console.error(e);
    chatDiv.innerHTML = '';
  }
})();
</script>
</body>
</html>
