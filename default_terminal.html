<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>~/projects/pi-ru</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap');

:root{
    --dock-right-pad:8px;
}

*{
    box-sizing:border-box;
}

html, body{
    margin:0;
    padding:0;
    height:100dvh;
}

/* ===== НОЧНОЕ НЕБО (ГРАДИЕНТ + МЕЛКИЕ ЗВЁЗДЫ + РЕДКИЕ МЕТЕОРЫ) ===== */
body{
    background: linear-gradient(180deg, #050914 0%, #1a2333 70%, #2a3a4a 100%);
    color:#fff;
    font-family:'Inter',system-ui,sans-serif;
    font-style: italic;
    font-weight:400;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    position: relative;
}

/* Звёзды — много мелких, еле заметных точек */
body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    box-shadow: 
        /* верхняя часть неба (много точек) */
        50px 30px 0 0 rgba(255,255,255,0.3),
        180px 70px 0 0 rgba(255,255,240,0.25),
        320px 40px 0 0 rgba(200,220,255,0.35),
        480px 120px 0 0 rgba(255,255,200,0.2),
        650px 25px 0 0 rgba(255,255,255,0.4),
        800px 90px 0 0 rgba(180,200,255,0.3),
        950px 50px 0 0 rgba(255,240,200,0.25),
        1100px 110px 0 0 rgba(255,255,255,0.35),
        1300px 30px 0 0 rgba(200,220,255,0.2),
        1450px 80px 0 0 rgba(255,255,240,0.3),
        1600px 45px 0 0 rgba(255,255,255,0.4),
        1750px 100px 0 0 rgba(200,220,255,0.25),
        /* средняя часть */
        70px 200px 0 0 rgba(255,255,255,0.2),
        250px 280px 0 0 rgba(180,200,255,0.3),
        420px 220px 0 0 rgba(255,240,200,0.25),
        600px 350px 0 0 rgba(255,255,255,0.35),
        780px 250px 0 0 rgba(200,220,255,0.2),
        920px 320px 0 0 rgba(255,255,240,0.3),
        1080px 180px 0 0 rgba(255,255,255,0.4),
        1220px 300px 0 0 rgba(180,200,255,0.25),
        1400px 240px 0 0 rgba(255,255,200,0.2),
        1580px 290px 0 0 rgba(255,255,255,0.3),
        1680px 200px 0 0 rgba(200,220,255,0.35),
        /* нижняя часть (ближе к горизонту меньше звёзд) */
        150px 450px 0 0 rgba(255,255,255,0.15),
        400px 500px 0 0 rgba(180,200,255,0.2),
        700px 550px 0 0 rgba(255,240,200,0.15),
        1000px 480px 0 0 rgba(255,255,255,0.25),
        1300px 520px 0 0 rgba(200,220,255,0.2),
        1600px 560px 0 0 rgba(255,255,240,0.15);
    animation: starTwinkle 5s infinite alternate ease-in-out;
    pointer-events: none;
    z-index: 0;
}

@keyframes starTwinkle {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
}

/* Метеоры — тонкие, быстрые, еле заметные */
.meteor {
    position: fixed;
    width: 1px;
    height: 180px;
    background: linear-gradient(180deg, 
        rgba(255,255,255,0) 0%, 
        rgba(255,240,200,0.15) 40%,
        rgba(255,235,150,0.4) 70%,
        rgba(255,255,255,0) 100%);
    transform: rotate(35deg);
    opacity: 0;
    pointer-events: none;
    z-index: 1;
    box-shadow: 0 0 4px rgba(255,235,150,0.3);
    filter: blur(0.8px);
    animation-duration: 1.2s;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
}

/* 5 метеоров с разными задержками и позициями */
.meteor-1 { left: 5%; top: -200px; animation-name: meteorFall1; animation-delay: 0s; }
.meteor-2 { left: 25%; top: -300px; animation-name: meteorFall2; animation-delay: 8s; }
.meteor-3 { left: 50%; top: -150px; animation-name: meteorFall3; animation-delay: 17s; }
.meteor-4 { left: 70%; top: -250px; animation-name: meteorFall4; animation-delay: 29s; }
.meteor-5 { left: 85%; top: -180px; animation-name: meteorFall5; animation-delay: 41s; }

@keyframes meteorFall1 {
    0% { transform: translateY(-200px) translateX(0) rotate(35deg); opacity: 0; }
    8% { opacity: 0.7; }
    20% { opacity: 0.2; }
    100% { transform: translateY(120vh) translateX(400px) rotate(35deg); opacity: 0; }
}
@keyframes meteorFall2 {
    0% { transform: translateY(-300px) translateX(0) rotate(35deg); opacity: 0; }
    6% { opacity: 0.6; }
    18% { opacity: 0.15; }
    100% { transform: translateY(130vh) translateX(350px) rotate(35deg); opacity: 0; }
}
@keyframes meteorFall3 {
    0% { transform: translateY(-150px) translateX(0) rotate(35deg); opacity: 0; }
    10% { opacity: 0.8; }
    22% { opacity: 0.1; }
    100% { transform: translateY(110vh) translateX(500px) rotate(35deg); opacity: 0; }
}
@keyframes meteorFall4 {
    0% { transform: translateY(-250px) translateX(0) rotate(35deg); opacity: 0; }
    7% { opacity: 0.5; }
    15% { opacity: 0.2; }
    100% { transform: translateY(140vh) translateX(300px) rotate(35deg); opacity: 0; }
}
@keyframes meteorFall5 {
    0% { transform: translateY(-180px) translateX(0) rotate(35deg); opacity: 0; }
    9% { opacity: 0.65; }
    21% { opacity: 0.1; }
    100% { transform: translateY(125vh) translateX(450px) rotate(35deg); opacity: 0; }
}

/* ===== БЕГУЩИЙ СКАЙЛАЙН ===== */
.skyline {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #ffeb3b, transparent);
    z-index: 10000;
    pointer-events: none;
    animation: scanlineMove 4s linear infinite;
}

@keyframes scanlineMove {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

/* ===== ОСНОВНЫЕ ЭЛЕМЕНТЫ (поверх неба) ===== */
#chatMessages{
    position:fixed;
    top:10px;
    left:10px;
    right:10px;
    bottom:115px;
    overflow-y:auto;
    padding:10px;
    z-index: 2;
}

#messageInput{
    position:fixed;
    bottom:40px;
    left:10px;
    right:10px;
    max-height:120px;
    background:transparent;
    color:#fff;
    border:none;
    border-top:1px solid rgba(255,235,59,0.6);
    border-bottom:1px solid rgba(255,235,59,0.6);
    font-family:'Inter',system-ui,sans-serif;
    font-size:14px;
    letter-spacing:0.02em;
    padding:8px 12px;
    height:35px;
    min-height:35px;
    outline:none;
    resize:none;
    line-height:1.4;
    overflow-y:auto;
    font-style: italic;
    z-index: 2;
    backdrop-filter: blur(2px);
}

#messageInput::placeholder{
    color:rgba(255,255,255,0.15);
    font-style: italic;
}

#sendLabel{
    position:fixed;
    bottom:46px;
    right:20px;
    color:rgba(255,255,255,0.6);
    font-size:16px;
    font-weight:500;
    cursor:pointer;
    user-select:none;
    transition:color 0.2s, opacity 0.2s, transform 0.2s;
    font-style: italic;
    z-index: 2;
}

#sendLabel:hover{
    color:#ffeb3b !important;
}

#sendLabel.thinking{
    color:rgba(255,255,255,0.95);
    animation:pulseSend 1s ease-in-out infinite;
}

@keyframes pulseSend{
    0% { opacity:.45; transform:translateY(0px); }
    50% { opacity:1; transform:translateY(-1px); }
    100% { opacity:.45; transform:translateY(0px); }
}

#bottomBar{
    position:fixed;
    left:10px;
    right:10px;
    bottom:12px;
    min-height:24px;
    display:flex;
    align-items:center;
    gap:8px;
    z-index:20;
    padding-top: 3px;
}

#pathDisplay{
    font-size:15px;
    opacity:0.42;
    line-height:1;
    white-space:nowrap;
    flex:0 0 auto;
    letter-spacing:0.01em;
    font-style: italic;
    margin-right:auto;
    z-index: 2;
}

#rightGroup{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:3px;
    flex-shrink:0;
    min-width:0;
    z-index: 2;
}

#publicControls{
    display:none;
    align-items:center;
    gap:3px;
}

#publicControls button{
    background:rgba(255,255,255,0.08);
    color:#fff;
    border:1px solid rgba(255,235,59,0.5);
    border-radius:2px;
    font-family:'Inter',system-ui,sans-serif;
    font-size:10px;
    font-style: italic;
    font-weight:500;
    letter-spacing:0.02em;
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    transition:all 0.2s;
    height:24px;
    min-height:24px;
    padding:0 7px;
    min-width:42px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    line-height:1;
    cursor:pointer;
}

#publicControls button:hover{
    background:rgba(255,235,59,0.08);
    border-color:#ffeb3b;
}

#adminControls{
    display:none;
    align-items:center;
    gap:3px;
    min-width:0;
    flex:0 1 auto;
    overflow-x:auto;
    scrollbar-width:none;
}

#adminControls::-webkit-scrollbar{
    display:none;
}

#adminControls select,
#adminControls button{
    background:rgba(255,255,255,0.08);
    color:#fff;
    border:1px solid rgba(255,235,59,0.5);
    border-radius:2px;
    font-family:'Inter',system-ui,sans-serif;
    font-size:10px;
    font-style: italic;
    font-weight:500;
    letter-spacing:0.02em;
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    transition:all 0.2s;
    vertical-align:middle;
    margin:0;
}

#adminControls button{
    height:24px;
    min-height:24px;
    padding:0 7px;
    min-width:42px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    line-height:1;
    cursor:pointer;
}

#adminControls select{
    height:24px;
    min-height:24px;
    width:72px;
    min-width:72px;
    max-width:72px;
    padding:0 16px 0 6px;
    text-align-last:center;
    line-height:22px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(4px);
}

#adminControls select:hover,
#adminControls button:hover{
    background:rgba(255,235,59,0.08);
    border-color:#ffeb3b;
}

#modelDock{
    position:relative;
    flex:0 0 128px;
    width:128px;
    min-width:128px;
    max-width:128px;
    margin-right:-10px;
}

#modelCurrent{
    display:block;
    width:100%;
    max-width:100%;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    font-family:'Inter',system-ui,sans-serif;
    font-size:11px;
    font-weight:500;
    opacity:0.68;
    text-align:right;
    padding-right:var(--dock-right-pad);
    cursor:pointer;
    letter-spacing:0.01em;
    font-style: italic;
    user-select:none;
}

#modelCurrent.admin-clickable{
    cursor:pointer;
}

#modelDropdown{
    display:none;
    position:absolute;
    bottom:100%;
    right:0;
    background:transparent;
    backdrop-filter:blur(4px);
    padding:6px 0 4px 0;
    z-index:40;
    white-space:nowrap;
    max-height:calc(100dvh - 80px);
    overflow-y:auto;
    border:none;
    width:max-content;
    max-width:360px;
    margin-bottom:6px;
}

.model-option{
    position:relative;
    padding:7px var(--dock-right-pad) 7px 10px;
    color:rgba(255,255,255,0.72);
    font-size:10px;
    cursor:pointer;
    white-space:normal;
    word-break:break-word;
    font-family:'Inter',system-ui,sans-serif;
    font-weight:500;
    font-style: italic;
    letter-spacing:0.01em;
    border:none;
    border-radius:0;
    transition:background 0.18s, color 0.18s, opacity 0.18s;
    text-align:right;
}

.model-option:hover{
    background:linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 55%, rgba(255,255,255,0.07) 100%);
    color:rgba(255,255,255,0.9);
}

.model-option.active{
    background:linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.04) 48%, rgba(255,255,255,0.1) 100%);
    color:rgba(255,255,255,0.96);
}

.model-option.active::after{
    content:'';
    position:absolute;
    top:5px;
    bottom:5px;
    right:0;
    width:1px;
    background:rgba(255,255,255,0.22);
}

.msgWrap{
    margin-bottom:4px;
}

.msgWrap.adminDeletable{
    cursor:pointer;
}

.msgWrap.adminDeletable:hover{
    outline:1px dashed rgba(255,255,255,0.18);
}

.msg{
    margin:0;
    opacity:0.28;
    letter-spacing:0.02em;
    line-height:1.45;
    word-break:break-word;
    white-space:pre-wrap;
    font-size:14px;
    font-family:'Inter',system-ui,sans-serif;
    font-style: italic;
}

.msg.assistant{
    opacity:1;
    color:#dceee1;
}

.msg.user{
    opacity:0.45;
    font-size:12px;
    color:rgba(255,255,255,0.82);
}

#fullscreenZone{
    position:fixed;
    top:5px;
    right:12px;
    width:50px;
    height:50px;
    z-index:100;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    opacity:0.3;
}

#fullscreenZone span{
    font-size:10px;
    color:rgba(255,255,255,0.2);
    font-family:'Inter',system-ui,sans-serif;
    font-weight:500;
    letter-spacing:0.04em;
    font-style: italic;
}

@media (max-width:720px){
    #bottomBar{
        gap:6px;
        align-items:center;
        padding-top: 3px;
    }

    #pathDisplay{
        font-size:12px;
        overflow:visible;
    }

    #rightGroup{
        gap:3px;
        max-width:calc(100vw - 112px);
        flex-shrink:1;
        min-width:0;
    }

    #publicControls{
        gap:3px;
    }

    #publicControls button{
        height:22px;
        min-height:22px;
        padding:0 5px;
        min-width:38px;
        font-size:9px;
    }

    #adminControls{
        gap:3px;
        overflow-x:auto;
    }

    #adminControls select,
    #adminControls button{
        font-size:9px;
    }

    #adminControls button{
        height:22px;
        min-height:22px;
        padding:0 5px;
        min-width:38px;
    }

    #adminControls select{
        height:22px;
        min-height:22px;
        width:66px;
        min-width:66px;
        max-width:66px;
        padding:0 14px 0 5px;
        line-height:20px;
    }

    #modelDock{
        flex:0 0 108px;
        width:108px;
        min-width:108px;
        max-width:108px;
        margin-right:-10px;
    }

    #modelCurrent{
        max-width:100%;
        font-size:10px;
        padding-right:var(--dock-right-pad);
    }

    .model-option{
        padding-right:var(--dock-right-pad);
        white-space:normal;
        word-break:break-word;
    }

    #modelDropdown{
        max-width:92vw;
    }

    .msg{
        font-size:13px;
    }

    .msg.user{
        font-size:11px;
    }
}

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-track{
    background:rgb(14,16,22);
}

::-webkit-scrollbar-thumb{
    background:rgb(42,48,68);
    border-radius:4px;
}

*{
    scrollbar-width:thin;
    scrollbar-color:rgb(42,48,68) rgb(14,16,22);
}
</style>
</head>
<body>

<!-- Метеоры — теперь 5 штук, пролетают редко -->
<div class="meteor meteor-1"></div>
<div class="meteor meteor-2"></div>
<div class="meteor meteor-3"></div>
<div class="meteor meteor-4"></div>
<div class="meteor meteor-5"></div>

<!-- Бегущий скайлайн -->
<div class="skyline"></div>

<div id="chatMessages"></div>
<textarea id="messageInput" rows="1" placeholder="Type message..."></textarea>
<div id="sendLabel">Send</div>

<div id="bottomBar">
  <div id="pathDisplay">~/projects/pi-ru</div>

  <div id="rightGroup">
    <div id="publicControls">
      <button id="publicUndoBtn" type="button">undo</button>
      <button id="publicRedoBtn" type="button">redo</button>
    </div>

    <div id="adminControls">
      <select id="sessionSelect"></select>
      <button id="undoBtn" type="button">undo</button>
      <button id="redoBtn" type="button">redo</button>
      <button id="clearBtn" type="button">clear</button>
      <button id="refreshBtn" type="button">refresh</button>
    </div>

    <div id="modelDock">
      <div id="modelCurrent"></div>
      <div id="modelDropdown"></div>
    </div>
  </div>
</div>

<div id="fullscreenZone"><span>FULL</span></div>

<script>
/* весь JavaScript остаётся без изменений, он здесь для полноты */
const rawAlias = location.search.length > 1 ? decodeURIComponent(location.search.slice(1)) : '';
const ADMIN_HEADER = rawAlias;
const MODEL_LABEL_STORAGE_KEY = 'pi_last_model_label';

const chatDiv = document.getElementById('chatMessages');
const input = document.getElementById('messageInput');
const sendLabel = document.getElementById('sendLabel');
const pathDisplay = document.getElementById('pathDisplay');
const fsZone = document.getElementById('fullscreenZone');

const adminControls = document.getElementById('adminControls');
const publicControls = document.getElementById('publicControls');
const sessionSelect = document.getElementById('sessionSelect');
const undoBtn = document.getElementById('undoBtn');
const redoBtn = document.getElementById('redoBtn');
const clearBtn = document.getElementById('clearBtn');
const refreshBtn = document.getElementById('refreshBtn');
const publicUndoBtn = document.getElementById('publicUndoBtn');
const publicRedoBtn = document.getElementById('publicRedoBtn');

const modelCurrent = document.getElementById('modelCurrent');
const modelDropdown = document.getElementById('modelDropdown');

let adminMode = false;
let currentSession = 'default';
let currentModel = {
  provider: 'groq',
  model: 'llama-3.1-8b-instant',
  label: 'llama 3.1 8B'
};
let models = [];
let poller = null;
let isSending = false;

let clearConfirmArmed = false;
let clearConfirmTimer = null;

function baseModelName(name) {
  let s = String(name || '').trim();

  if (s.includes('·')) s = s.split('·').pop().trim();
  if (s.includes('/')) s = s.split('/').pop().trim();

  s = s
    .replace(/^openrouter\s*[:·-]?\s*/i, '')
    .replace(/^open router\s*[:·-]?\s*/i, '')
    .replace(/^groq\s*[:·-]?\s*/i, '')
    .replace(/^meta[- ]llama\s*[:·-]?\s*/i, '')
    .replace(/^meta\s*[:·-]?\s*/i, '')
    .replace(/^openai\s*[:·-]?\s*/i, '')
    .replace(/^google\s*[:·-]?\s*/i, '')
    .replace(/^anthropic\s*[:·-]?\s*/i, '')
    .replace(/^moonshotai\s*[:·-]?\s*/i, '')
    .replace(/^moonshot\s*[:·-]?\s*/i, '')
    .trim();

  return s;
}

function humanModelName(name) {
  let s = baseModelName(name);

  const directMap = [
    [/^llama[- ]?3\.1[- ]?8b[- ]?instant$/i, 'llama 3.1 8B'],
    [/^llama[- ]?3\.1[- ]?70b[- ]?versatile$/i, 'llama 3.1 70B'],
    [/^llama[- ]?3\.3[- ]?70b[- ]?versatile$/i, 'llama 3.3 70B'],
    [/^gpt[- ]?4o[- ]?mini$/i, 'GPT-4o mini'],
    [/^gpt[- ]?4\.?1[- ]?mini$/i, 'GPT-4.1 mini'],
    [/^gpt[- ]?4\.?1$/i, 'GPT-4.1'],
    [/^kimi[- ]?k2$/i, 'Kimi K2'],
    [/^gemini[- ]?2\.0[- ]?flash(?:[- ]?exp)?$/i, 'Gemini 2.0 Flash'],
    [/^deepseek[- ]?chat(?:[- ]?v?\d+(?:[- ]?\d+)*)?$/i, 'DeepSeek Chat'],
    [/^deepseek[- ]?r1(?:[- ]?distill)?$/i, 'DeepSeek R1'],
    [/^claude[- ]?3\.7[- ]?sonnet$/i, 'Claude 3.7 Sonnet'],
    [/^claude[- ]?3\.5[- ]?sonnet$/i, 'Claude 3.5 Sonnet'],
    [/^qwen[- ]?2\.5[- ]?72b(?:[- ]?instruct)?$/i, 'Qwen 2.5 72B'],
    [/^qwen[- ]?2\.5[- ]?32b(?:[- ]?instruct)?$/i, 'Qwen 2.5 32B'],
    [/^qwen[- ]?2\.5[- ]?14b(?:[- ]?instruct)?$/i, 'Qwen 2.5 14B'],
    [/^mistral[- ]?small(?:[- ]?\d+(?:\.\d+)?)?$/i, 'Mistral Small']
  ];

  for (const [rx, out] of directMap) {
    if (rx.test(s)) return out;
  }

  s = s
    .replace(/[_]+/g, '-')
    .replace(/\binstant\b/ig, '')
    .replace(/\binstruct\b/ig, '')
    .replace(/\bversatile\b/ig, '')
    .replace(/\bpreview\b/ig, '')
    .replace(/\blatest\b/ig, '')
    .replace(/\bonline\b/ig, '')
    .replace(/\bfree\b/ig, '')
    .replace(/\s+/g, ' ')
    .replace(/-+/g, ' ')
    .trim();

  if (!s) return 'model';

  const tokens = s.split(' ').map(t => {
    const low = t.toLowerCase();
    if (low === 'gpt') return 'GPT';
    if (low === 'claude') return 'Claude';
    if (low === 'gemini') return 'Gemini';
    if (low === 'kimi') return 'Kimi';
    if (low === 'qwen') return 'Qwen';
    if (low === 'deepseek') return 'DeepSeek';
    if (low === 'mistral') return 'Mistral';
    if (low === 'grok') return 'Grok';
    if (low === 'llama') return 'llama';
    return t;
  });

  return tokens.join(' ');
}

function compactModelName(name, maxLen = 18) {
  let s = humanModelName(name);

  if (s.length <= maxLen) return s;

  s = s
    .replace(/\bChat\b/ig, '')
    .replace(/\bSonnet\b/ig, '')
    .replace(/\s+/g, ' ')
    .trim();

  if (s.length <= maxLen) return s;

  return s.slice(0, maxLen - 1).trimEnd() + '…';
}

function providerShort(provider) {
  const p = String(provider || '').trim().toLowerCase();
  if (p === 'openrouter') return 'OR';
  if (p === 'groq') return 'GROQ';
  return String(provider || '').trim();
}

function currentModelLabel(provider, name) {
  return compactModelName(name, 18);
}

function dropdownModelLabel(provider, name) {
  let fullName = humanModelName(name);
  let shortProvider = providerShort(provider);
  let isFree = false;
  if (name && typeof name === 'string') {
    let lowerName = name.toLowerCase();
    if (lowerName.includes('free') || lowerName.includes(':free')) {
      isFree = true;
    }
  }
  if (fullName.toLowerCase().includes('free')) isFree = true;
  
  if (isFree) {
    return `FREE · ${shortProvider}: ${fullName}`;
  }
  return `${shortProvider}: ${fullName}`;
}

function setVisibleModelLabel(label) {
  const safe = String(label || '').trim();
  if (!safe) return;
  modelCurrent.textContent = safe;
  localStorage.setItem(MODEL_LABEL_STORAGE_KEY, safe);
}

function seedModelLabelFromStorage() {
  const saved = localStorage.getItem(MODEL_LABEL_STORAGE_KEY);
  modelCurrent.textContent = saved || currentModel.label || 'model';
}

function setThinking(v) {
  sendLabel.classList.toggle('thinking', !!v);
  sendLabel.textContent = v ? '...' : 'Send';
}

function api(method, url, data=null, admin=false) {
  const headers = {'Content-Type': 'application/json'};
  if (admin) headers['X-Admin-Alias'] = ADMIN_HEADER;

  return fetch(url, {
    method,
    headers,
    body: data ? JSON.stringify(data) : null
  }).then(async (res) => {
    const payload = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(payload.error || ('HTTP ' + res.status));
    return payload;
  });
}

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}

function armClearButton() {
  clearConfirmArmed = true;
  clearBtn.textContent = 'sure?';
  clearBtn.style.background = 'rgba(255,120,120,0.16)';
  clearBtn.style.borderColor = 'rgba(255,160,160,0.34)';

  if (clearConfirmTimer) clearTimeout(clearConfirmTimer);
  clearConfirmTimer = setTimeout(() => {
    disarmClearButton();
  }, 900);
}

function disarmClearButton() {
  clearConfirmArmed = false;
  clearBtn.textContent = 'clear';
  clearBtn.style.background = '';
  clearBtn.style.borderColor = '';

  if (clearConfirmTimer) {
    clearTimeout(clearConfirmTimer);
    clearConfirmTimer = null;
  }
}

function renderHistory(items) {
  chatDiv.innerHTML = '';
  if (!items || !items.length) return;

  for (const item of items) {
    const wrap = document.createElement('div');
    wrap.className = 'msgWrap' + (adminMode ? ' adminDeletable' : '');
    if (item.id) wrap.dataset.id = item.id;

    const msg = document.createElement('div');
    const isUser = item.role === 'user';
    msg.className = 'msg ' + (isUser ? 'user' : 'assistant');
    msg.textContent = item.message || item.content || '';
    wrap.appendChild(msg);

    if (adminMode && item.id) {
      wrap.title = 'Double click to delete';
      wrap.ondblclick = async () => {
        try {
          await api('POST', '/admin/delete_message', {id: item.id}, true);
          await loadHistory();
        } catch (e) {
          console.error(e);
        }
      };
    }

    chatDiv.appendChild(wrap);
  }

  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function renderModelDock() {
  const rawName = currentModel.model || currentModel.label || '';
  const label = currentModelLabel(currentModel.provider, rawName);

  setVisibleModelLabel(label);
  modelCurrent.title = humanModelName(rawName);
  modelDropdown.innerHTML = '';

  if (!adminMode) {
    modelCurrent.classList.remove('admin-clickable');
    modelDropdown.style.display = 'none';
    return;
  }

  modelCurrent.classList.add('admin-clickable');

  // ИСПРАВЛЕННАЯ СОРТИРОВКА: GROQ → Kimi → OpenRouter → остальные
  const sorted = [...models].sort((a, b) => {
    const order = { groq: 1, kimi: 2, openrouter: 3 };
    const pa = a.provider.toLowerCase();
    const pb = b.provider.toLowerCase();
    const oa = order[pa] ?? 999;
    const ob = order[pb] ?? 999;
    if (oa !== ob) return oa - ob;
    return pa.localeCompare(pb);
  });

  for (const m of sorted) {
    const isActive = m.provider === currentModel.provider && m.model === currentModel.model;
    const el = document.createElement('div');
    el.className = 'model-option' + (isActive ? ' active' : '');
    el.textContent = dropdownModelLabel(m.provider, m.model || m.name || '');
    el.title = m.model || m.name || '';
    el.style.whiteSpace = 'normal';
    el.style.wordBreak = 'break-word';

    el.onclick = async (e) => {
      e.stopPropagation();
      try {
        const data = await api('POST', '/admin/set_model', {
          provider: m.provider,
          model: m.model
        }, true);

        currentModel = {
          provider: data.provider,
          model: data.model,
          label: data.label || dropdownModelLabel(data.provider, data.model)
        };
        renderModelDock();
        modelDropdown.style.display = 'none';
      } catch (e2) {
        console.error(e2);
      }
    };

    modelDropdown.appendChild(el);
  }
}

async function syncGlobalModel() {
  try {
    const gm = await api('GET', '/global_model');
    currentModel = {
      provider: gm.provider,
      model: gm.model,
      label: gm.label || (gm.provider + ' / ' + gm.model)
    };
    renderModelDock();
  } catch (_) {}
}

async function loadModels() {
  try {
    const data = await api('GET', '/models');
    models = data.models || [];
  } catch (_) {
    models = [];
  }
}

async function loadPublic() {
  adminMode = false;
  adminControls.style.display = 'none';
  publicControls.style.display = 'flex';
  pathDisplay.textContent = '~/projects/pi-ru';
  await syncGlobalModel();
  await loadHistory();
}

async function loadAdmin() {
  adminMode = true;
  adminControls.style.display = 'flex';
  publicControls.style.display = 'none';
  pathDisplay.textContent = '~/projects/pi-ru';

  const state = await api('GET', '/admin/state', null, true);
  await loadModels();

  currentModel = state.global_model || currentModel;
  currentSession = localStorage.getItem('pi_admin_target_session') || 'private';
  if (!state.sessions.includes(currentSession)) {
    currentSession = state.sessions.includes('private') ? 'private' : (state.sessions[0] || 'default');
  }

  sessionSelect.innerHTML = '';
  for (const s of state.sessions) {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    if (s === currentSession) opt.selected = true;
    sessionSelect.appendChild(opt);
  }

  renderModelDock();
  await loadHistory();
}

async function loadHistory() {
  if (adminMode) {
    const data = await api('POST', '/admin/history', {session: currentSession}, true);
    renderHistory(data.history || []);
  } else {
    const data = await api('POST', '/history', {});
    renderHistory(data.history || []);
  }
}

function showError(msg) {
  const wrap = document.createElement('div');
  wrap.className = 'msgWrap';
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg assistant';
  msgDiv.style.color = '#ff8a8a';
  msgDiv.style.whiteSpace = 'pre-wrap';
  msgDiv.textContent = 'Ошибка: ' + msg;
  wrap.appendChild(msgDiv);
  chatDiv.appendChild(wrap);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isSending) return;

  isSending = true;
  input.value = '';
  autoResize();
  setThinking(true);
  sendLabel.style.pointerEvents = 'none';

  try {
    if (adminMode) {
      const data = await api('POST', '/admin/chat', {
        session: currentSession,
        message: text
      }, true);

      await loadHistory();
      await syncGlobalModel();

      if (data.changed) setTimeout(() => location.reload(), 250);
    } else {
      const data = await api('POST', '/chat', { message: text });
      await loadHistory();
      await syncGlobalModel();
      if (data.changed) setTimeout(() => location.reload(), 250);
    }
  } catch (e) {
    console.error(e);
    showError(e.message);
  } finally {
    isSending = false;
    sendLabel.style.pointerEvents = '';
    setThinking(false);
  }
}

function startPolling() {
  if (poller) clearInterval(poller);
  poller = setInterval(async () => {
    try {
      await loadHistory();
      await syncGlobalModel();
    } catch (_) {}
  }, 2500);
}

sendLabel.onclick = sendMessage;

input.addEventListener('input', autoResize);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sessionSelect.addEventListener('change', async () => {
  currentSession = sessionSelect.value;
  localStorage.setItem('pi_admin_target_session', currentSession);
  disarmClearButton();
  await loadHistory();
});

undoBtn.onclick = async () => {
  try {
    disarmClearButton();
    await api('POST', '/admin/undo', {session: currentSession}, true);
    location.reload();
  } catch (e) {
    console.error(e);
    showError(e.message || 'Undo failed');
  }
};

redoBtn.onclick = async () => {
  try {
    disarmClearButton();
    await api('POST', '/admin/redo', {session: currentSession}, true);
    location.reload();
  } catch (e) {
    console.error(e);
    showError(e.message || 'Redo failed');
  }
};

publicUndoBtn.onclick = async () => {
  try {
    await api('POST', '/undo', {});
    location.reload();
  } catch (e) {
    console.error(e);
    showError(e.message || 'Undo failed');
  }
};

publicRedoBtn.onclick = async () => {
  try {
    await api('POST', '/redo', {});
    location.reload();
  } catch (e) {
    console.error(e);
    showError(e.message || 'Redo failed');
  }
};

clearBtn.onclick = async () => {
  try {
    if (!clearConfirmArmed) {
      armClearButton();
      return;
    }

    disarmClearButton();
    await api('POST', '/admin/clear_session', {session: currentSession}, true);
    await loadHistory();
  } catch (e) {
    console.error(e);
    showError(e.message || 'Clear failed');
  }
};

refreshBtn.onclick = () => {
  disarmClearButton();
  location.reload();
};

modelCurrent.onclick = (e) => {
  e.stopPropagation();
  if (!adminMode) return;
  const willOpen = modelDropdown.style.display !== 'block';
  if (willOpen) {
    modelDropdown.style.display = 'block';
    modelDropdown.scrollTop = 0;
  } else {
    modelDropdown.style.display = 'none';
  }
};

document.addEventListener('click', () => {
  modelDropdown.style.display = 'none';
});

fsZone.addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
});

(async function init() {
  try {
    seedModelLabelFromStorage();

    if (rawAlias.includes('-admin-')) {
      await loadAdmin();
    } else {
      await loadPublic();
    }

    startPolling();
    autoResize();
    input.focus();
  } catch (e) {
    console.error(e);
    chatDiv.innerHTML = '';
    showError('Ошибка запуска интерфейса: ' + (e.message || 'Неизвестная ошибка'));
  }
})();
</script>
</body>
</html>
