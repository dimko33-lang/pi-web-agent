<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>~/projects/pi-ru</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

:root{
    --glass-bg:rgba(255,255,255,0.08);
    --glass-bg-hover:rgba(255,255,255,0.12);
    --glass-border:rgba(255,255,255,0.18);
    --glass-border-strong:rgba(255,255,255,0.26);
    --dock-right-gap:5px;
}

html, body{
    margin:0;
    padding:0;
    height:100dvh;
}

body{
    background:
        radial-gradient(1100px 620px at 108% -8%, rgba(86,102,168,0.18), transparent 56%),
        radial-gradient(900px 540px at -8% 108%, rgba(70,82,136,0.11), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,0.018), rgba(255,255,255,0)),
        rgb(20,20,25);
    color:#fff;
    font-family:'Inter',system-ui,sans-serif;
    font-weight:400;
    font-style:normal;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
}

#chatMessages{
    position:fixed;
    top:10px;
    left:10px;
    right:10px;
    bottom:115px;
    overflow-y:auto;
    padding:10px;
}

#messageInput{
    position:fixed;
    bottom:40px;
    left:10px;
    right:10px;
    max-height:120px;
    background:transparent;
    color:#fff;
    border:none;
    border-top:1px solid rgba(255,255,255,0.3);
    border-bottom:1px solid rgba(255,255,255,0.3);
    font-family:'Inter',system-ui,sans-serif;
    font-size:14px;
    letter-spacing:0.02em;
    padding:8px 12px;
    height:35px;
    min-height:35px;
    box-sizing:border-box;
    outline:none;
    resize:none;
    line-height:1.4;
    overflow-y:auto;
}

#messageInput::placeholder{
    color:rgba(255,255,255,0.25);
    font-style:normal;
}

#sendLabel{
    position:fixed;
    bottom:46px;
    right:20px;
    color:rgba(255,255,255,0.6);
    font-size:16px;
    font-weight:500;
    cursor:pointer;
    user-select:none;
    transition:color 0.2s,opacity 0.2s,transform 0.2s;
}

#sendLabel:hover{
    color:rgba(255,255,255,0.9);
}

#sendLabel.thinking{
    color:rgba(255,255,255,0.95);
    animation:pulseSend 1s ease-in-out infinite;
}

@keyframes pulseSend{
    0% {opacity:.45;transform:translateY(0px);}
    50% {opacity:1;transform:translateY(-1px);}
    100% {opacity:.45;transform:translateY(0px);}
}

#bottomBar{
    position:fixed;
    left:10px;
    right:10px;
    bottom:12px;
    min-height:24px;
    display:flex;
    align-items:center;
    gap:8px;
    z-index:20;
}

#pathDisplay{
    font-size:15px;
    opacity:0.42;
    line-height:1;
    white-space:nowrap;
    flex:0 0 auto;
    letter-spacing:0.01em;
}

#adminControls{
    display:none;
    align-items:center;
    gap:4px;
    min-width:0;
    flex:0 1 auto;
    justify-content:flex-end;
    margin-left:auto;
}

#adminControls select,
#adminControls button{
    background:rgba(255,255,255,0.08);
    color:#fff;
    border:1px solid rgba(255,255,255,0.18);
    border-radius:2px;
    font-family:'Inter',system-ui,sans-serif;
    font-size:10px;
    font-style:normal;
    font-weight:500;
    letter-spacing:0.02em;
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    transition:all 0.2s;
    vertical-align:middle;
    margin:0;
    box-sizing:border-box;
}

#adminControls button{
    height:20px;
    min-height:20px;
    padding:0 7px;
    min-width:42px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    line-height:1;
    cursor:pointer;
}

#adminControls select{
    height:20px;
    min-height:20px;
    width:72px;
    min-width:72px;
    max-width:72px;
    padding:0 16px 0 6px;
    text-align-last:center;
    line-height:18px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(4px);
}

#clearAllBtn{
    min-width:54px;
}

#adminControls select:hover,
#adminControls button:hover{
    background:rgba(255,255,255,0.12);
    border-color:rgba(255,255,255,0.26);
}

#modelDock{
    margin-left:0;
    position:relative;
    flex:0 0 auto;
}

#modelCurrent{
    font-family:'Inter',system-ui,sans-serif;
    font-size:11px;
    font-weight:500;
    opacity:0.68;
    text-align:right;
    padding-right:var(--dock-right-gap);
    cursor:pointer;
    letter-spacing:0.01em;
}

#modelCurrent.admin-clickable{
    cursor:pointer;
}

#modelDropdown{
    display:none;
    position:absolute;
    bottom:100%;
    right:0;
    background:transparent;
    backdrop-filter:blur(4px);
    padding:6px 0 4px 0;
    z-index:40;
    white-space:nowrap;
    max-height:calc(100dvh - 80px);
    overflow-y:auto;
    border:none;
    width:max-content;
    max-width:360px;
    margin-bottom:6px;
}

.model-option{
    position:relative;
    padding:7px var(--dock-right-gap) 7px 10px;
    color:rgba(255,255,255,0.72);
    font-size:10px;
    cursor:pointer;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    font-family:'Inter',system-ui,sans-serif;
    font-weight:500;
    font-style:normal;
    letter-spacing:0.01em;
    border:none;
    border-radius:0;
    transition:background 0.18s, color 0.18s, opacity 0.18s;
    text-align:right;
}

.model-option:hover{
    background:linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 55%, rgba(255,255,255,0.07) 100%);
    color:rgba(255,255,255,0.9);
}

.model-option.active{
    background:linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.04) 48%, rgba(255,255,255,0.1) 100%);
    color:rgba(255,255,255,0.96);
}

.model-option.active::after{
    content:'';
    position:absolute;
    top:5px;
    bottom:5px;
    right:0;
    width:1px;
    background:rgba(255,255,255,0.22);
}

.msgWrap{
    margin-bottom:4px;
}

.msgWrap.adminDeletable{
    cursor:pointer;
}

.msgWrap.adminDeletable:hover{
    outline:1px dashed rgba(255,255,255,0.18);
}

.msg{
    margin:0;
    opacity:0.28;
    letter-spacing:0.02em;
    line-height:1.45;
    word-break:break-word;
    white-space:pre-wrap;
    font-size:14px;
    font-family:'Inter',system-ui,sans-serif;
}

.msg.assistant{
    opacity:1;
    color:#dceee1;
}

.msg.user{
    opacity:0.45;
    font-size:12px;
    color:rgba(255,255,255,0.82);
}

#fullscreenZone{
    position:fixed;
    top:5px;
    right:12px;
    width:50px;
    height:50px;
    z-index:100;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    opacity:0.3;
}

#fullscreenZone span{
    font-size:10px;
    color:rgba(255,255,255,0.2);
    font-family:'Inter',system-ui,sans-serif;
    font-weight:500;
    letter-spacing:0.04em;
}

@media (max-width:720px){
    #bottomBar{
        gap:6px;
        align-items:center;
    }

    #pathDisplay{
        font-size:12px;
        max-width:80px;
        overflow:hidden;
    }

    #adminControls{
        gap:4px;
        justify-content:flex-end;
        overflow-x:auto;
        scrollbar-width:none;
    }

    #adminControls::-webkit-scrollbar{
        display:none;
    }

    #adminControls select,
    #adminControls button{
        font-size:9px;
    }

    #adminControls button{
        height:19px;
        min-height:19px;
        padding:0 5px;
        min-width:38px;
    }

    #adminControls select{
        height:19px;
        min-height:19px;
        width:66px;
        min-width:66px;
        max-width:66px;
        padding:0 14px 0 5px;
        line-height:17px;
    }

    #clearAllBtn{
        min-width:48px;
    }

    #modelDropdown{
        max-width:92vw;
    }

    .msg{
        font-size:13px;
    }

    .msg.user{
        font-size:11px;
    }
}

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-track{
    background:rgb(14,16,22);
}

::-webkit-scrollbar-thumb{
    background:rgb(42,48,68);
    border-radius:4px;
}

*{
    scrollbar-width:thin;
    scrollbar-color:rgb(42,48,68) rgb(14,16,22);
}
</style>
</head>
<body>

<div id="chatMessages"></div>
<textarea id="messageInput" rows="1" placeholder="Type message..."></textarea>
<div id="sendLabel">Send</div>

<div id="bottomBar">
  <div id="pathDisplay">~/projects/pi-ru</div>
  <div id="adminControls">
    <select id="sessionSelect"></select>
    <button id="undoBtn" type="button">undo</button>
    <button id="clearBtn" type="button">clear</button>
    <button id="clearAllBtn" type="button">clear ALL</button>
    <button id="refreshBtn" type="button">refresh</button>
  </div>
  <div id="modelDock">
    <div id="modelCurrent">Loading...</div>
    <div id="modelDropdown"></div>
  </div>
</div>

<div id="fullscreenZone"><span>FULL</span></div>

<script>
const rawAlias = location.search.length > 1 ? decodeURIComponent(location.search.slice(1)) : '';
const ADMIN_HEADER = rawAlias;

const chatDiv = document.getElementById('chatMessages');
const input = document.getElementById('messageInput');
const sendLabel = document.getElementById('sendLabel');
const pathDisplay = document.getElementById('pathDisplay');
const fsZone = document.getElementById('fullscreenZone');

const adminControls = document.getElementById('adminControls');
const sessionSelect = document.getElementById('sessionSelect');
const undoBtn = document.getElementById('undoBtn');
const clearBtn = document.getElementById('clearBtn');
const clearAllBtn = document.getElementById('clearAllBtn');
const refreshBtn = document.getElementById('refreshBtn');

const modelCurrent = document.getElementById('modelCurrent');
const modelDropdown = document.getElementById('modelDropdown');

let adminMode = false;
let currentSession = 'default';
let currentModel = {
  provider: 'groq',
  model: 'llama-3.1-8b-instant',
  label: 'Groq · Llama 3.1 8B (fast/free)'
};
let models = [];
let poller = null;
let isSending = false;

function cleanModelName(name) {
  return String(name || '')
    .replace(/^openrouter\s*[:·-]?\s*/i, '')
    .replace(/^open router\s*[:·-]?\s*/i, '')
    .replace(/^groq\s*[:·-]?\s*/i, '')
    .trim();
}

function shortenLabel(provider, name) {
  let p = String(provider || '').toLowerCase();

  if (p === 'openrouter') p = 'OR';
  else if (p === 'groq') p = 'GQ';
  else if (p === 'meta-llama') p = 'ML';
  else p = p.toUpperCase();

  return `${p}: ${cleanModelName(name)}`;
}

function setThinking(v) {
  sendLabel.classList.toggle('thinking', !!v);
  sendLabel.textContent = v ? '...' : 'Send';
}

function api(method, url, data=null, admin=false) {
  const headers = {'Content-Type': 'application/json'};
  if (admin) headers['X-Admin-Alias'] = ADMIN_HEADER;

  return fetch(url, {
    method,
    headers,
    body: data ? JSON.stringify(data) : null
  }).then(async (res) => {
    const payload = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(payload.error || ('HTTP ' + res.status));
    return payload;
  });
}

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}

function renderHistory(items) {
  chatDiv.innerHTML = '';
  if (!items || !items.length) return;

  for (const item of items) {
    const wrap = document.createElement('div');
    wrap.className = 'msgWrap' + (adminMode ? ' adminDeletable' : '');
    if (item.id) wrap.dataset.id = item.id;

    const msg = document.createElement('div');
    const isUser = item.role === 'user';
    msg.className = 'msg ' + (isUser ? 'user' : 'assistant');
    msg.textContent = item.message || item.content || '';
    wrap.appendChild(msg);

    if (adminMode && item.id) {
      wrap.title = 'Double click to delete';
      wrap.ondblclick = async () => {
        try {
          await api('POST', '/admin/delete_message', {id: item.id}, true);
          await loadHistory();
        } catch (e) {
          console.error(e);
        }
      };
    }

    chatDiv.appendChild(wrap);
  }

  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function renderModelDock() {
  modelCurrent.textContent = shortenLabel(
    currentModel.provider,
    currentModel.model || currentModel.label || ''
  );
  modelDropdown.innerHTML = '';

  if (!adminMode) {
    modelCurrent.classList.remove('admin-clickable');
    modelDropdown.style.display = 'none';
    return;
  }

  modelCurrent.classList.add('admin-clickable');

  const sorted = [...models].sort((a, b) => {
    const order = { groq: 1, openrouter: 2 };
    const pa = a.provider.toLowerCase();
    const pb = b.provider.toLowerCase();
    if (order[pa] && order[pb]) return order[pa] - order[pb];
    if (order[pa]) return -1;
    if (order[pb]) return 1;
    return pa.localeCompare(pb);
  });

  for (const m of sorted) {
    const isActive = m.provider === currentModel.provider && m.model === currentModel.model;
    const el = document.createElement('div');
    el.className = 'model-option' + (isActive ? ' active' : '');
    el.textContent = shortenLabel(m.provider, m.model || m.name || '');
    el.onclick = async (e) => {
      e.stopPropagation();
      try {
        const data = await api('POST', '/admin/set_model', {
          provider: m.provider,
          model: m.model
        }, true);

        currentModel = {
          provider: data.provider,
          model: data.model,
          label: data.label || shortenLabel(data.provider, data.model)
        };
        renderModelDock();
        modelDropdown.style.display = 'none';
      } catch (e2) {
        console.error(e2);
      }
    };
    modelDropdown.appendChild(el);
  }
}

async function syncGlobalModel() {
  try {
    const gm = await api('GET', '/global_model');
    currentModel = {
      provider: gm.provider,
      model: gm.model,
      label: gm.label || (gm.provider + ' / ' + gm.model)
    };
    renderModelDock();
  } catch (_) {}
}

async function loadModels() {
  try {
    const data = await api('GET', '/models');
    models = data.models || [];
  } catch (_) {
    models = [];
  }
}

async function loadPublic() {
  adminMode = false;
  adminControls.style.display = 'none';
  pathDisplay.textContent = '~/projects/pi-ru';
  await syncGlobalModel();
  await loadHistory();
}

async function loadAdmin() {
  adminMode = true;
  adminControls.style.display = 'flex';
  pathDisplay.textContent = '~/projects/pi-ru';

  const state = await api('GET', '/admin/state', null, true);
  await loadModels();

  currentModel = state.global_model || currentModel;
  currentSession = localStorage.getItem('pi_admin_target_session') || 'private';
  if (!state.sessions.includes(currentSession)) {
    currentSession = state.sessions.includes('private') ? 'private' : (state.sessions[0] || 'default');
  }

  sessionSelect.innerHTML = '';
  for (const s of state.sessions) {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    if (s === currentSession) opt.selected = true;
    sessionSelect.appendChild(opt);
  }

  renderModelDock();
  await loadHistory();
}

async function loadHistory() {
  if (adminMode) {
    const data = await api('POST', '/admin/history', {session: currentSession}, true);
    renderHistory(data.history || []);
  } else {
    const data = await api('POST', '/history', {});
    renderHistory(data.history || []);
  }
}

function showError(msg) {
  const wrap = document.createElement('div');
  wrap.className = 'msgWrap';
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg assistant';
  msgDiv.style.color = '#ff8a8a';
  msgDiv.style.whiteSpace = 'pre-wrap';
  msgDiv.textContent = 'Ошибка: ' + msg;
  wrap.appendChild(msgDiv);
  chatDiv.appendChild(wrap);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isSending) return;

  isSending = true;
  input.value = '';
  autoResize();
  setThinking(true);
  sendLabel.style.pointerEvents = 'none';

  try {
    if (adminMode) {
      const data = await api('POST', '/admin/chat', {
        session: currentSession,
        message: text
      }, true);

      await loadHistory();
      await syncGlobalModel();

      if (data.changed) setTimeout(() => location.reload(), 250);
    } else {
      const data = await api('POST', '/chat', { message: text });
      await loadHistory();
      await syncGlobalModel();
      if (data.changed) setTimeout(() => location.reload(), 250);
    }
  } catch (e) {
    console.error(e);
    showError(e.message);
  } finally {
    isSending = false;
    sendLabel.style.pointerEvents = '';
    setThinking(false);
  }
}

function startPolling() {
  if (poller) clearInterval(poller);
  poller = setInterval(async () => {
    try {
      await loadHistory();
      await syncGlobalModel();
    } catch (_) {}
  }, 2500);
}

sendLabel.onclick = sendMessage;

input.addEventListener('input', autoResize);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sessionSelect.addEventListener('change', async () => {
  currentSession = sessionSelect.value;
  localStorage.setItem('pi_admin_target_session', currentSession);
  await loadHistory();
});

undoBtn.onclick = async () => {
  try {
    await api('POST', '/admin/undo', {session: currentSession}, true);
    await loadHistory();
    location.reload();
  } catch (e) {
    console.error(e);
  }
};

clearBtn.onclick = async () => {
  try {
    await api('POST', '/admin/clear_session', {session: currentSession}, true);
    await loadHistory();
  } catch (e) {
    console.error(e);
  }
};

clearAllBtn.onclick = async () => {
  try {
    await api('POST', '/admin/clear_all_histories', {}, true);
    await loadHistory();
  } catch (e) {
    console.error(e);
  }
};

refreshBtn.onclick = () => location.reload();

modelCurrent.onclick = (e) => {
  e.stopPropagation();
  if (!adminMode) return;
  const willOpen = modelDropdown.style.display !== 'block';
  if (willOpen) {
    modelDropdown.style.display = 'block';
    modelDropdown.scrollTop = 0;
  } else {
    modelDropdown.style.display = 'none';
  }
};

document.addEventListener('click', () => {
  modelDropdown.style.display = 'none';
});

fsZone.addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
});

(async function init() {
  try {
    if (rawAlias.includes('-admin-')) {
      await loadAdmin();
    } else {
      await loadPublic();
    }

    startPolling();
    autoResize();
    input.focus();
  } catch (e) {
    console.error(e);
    chatDiv.innerHTML = '';
    showError('Ошибка запуска интерфейса: ' + (e.message || 'Неизвестная ошибка'));
  }
})();
</script>
</body>
</html>
