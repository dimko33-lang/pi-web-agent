<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>~/projects/pi-ru</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap');

:root{
    --dock-right-gap:12px; /* увеличен отступ для названия модели от правого края */
}

html, body{
    margin:0;
    padding:0;
    height:100dvh;
}

body{
    background: rgb(20,20,25);
    color:#fff;
    font-family:'Inter',system-ui,sans-serif;
    font-style: italic;
    font-weight:400;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
}

#chatMessages{
    position:fixed;
    top:10px;
    left:10px;
    right:10px;
    bottom:115px;
    overflow-y:auto;
    padding:10px;
}

#messageInput{
    position:fixed;
    bottom:40px;
    left:10px;
    right:10px;
    max-height:120px;
    background:transparent;
    color:#fff;
    border:none;
    border-top:1px solid rgba(255,255,255,0.3);
    border-bottom:1px solid rgba(255,255,255,0.3);
    font-family:'Inter',system-ui,sans-serif;
    font-size:14px;
    letter-spacing:0.02em;
    padding:8px 12px;
    height:35px;
    min-height:35px;
    box-sizing:border-box;
    outline:none;
    resize:none;
    line-height:1.4;
    overflow-y:auto;
    font-style: italic;
}

#messageInput::placeholder{
    color:rgba(255,255,255,0.25);
    font-style: italic;
}

#sendLabel{
    position:fixed;
    bottom:46px;
    right:20px;
    color:rgba(255,255,255,0.6);
    font-size:16px;
    font-weight:500;
    cursor:pointer;
    user-select:none;
    transition:color 0.2s, opacity 0.2s, transform 0.2s;
    font-style: italic;
}

#sendLabel:hover{
    color:rgba(255,255,255,0.9);
}

#sendLabel.thinking{
    color:rgba(255,255,255,0.95);
    animation:pulseSend 1s ease-in-out infinite;
}

@keyframes pulseSend{
    0% { opacity:.45; transform:translateY(0px); }
    50% { opacity:1; transform:translateY(-1px); }
    100% { opacity:.45; transform:translateY(0px); }
}

#bottomBar{
    position:fixed;
    left:10px;
    right:10px;
    bottom:12px;
    min-height:24px;
    display:flex;
    align-items:center;
    gap:8px;
    z-index:20;
}

#pathDisplay{
    font-size:15px;
    opacity:0.42;
    line-height:1;
    white-space:nowrap;
    flex:0 0 auto;
    letter-spacing:0.01em;
    font-style: italic;
    margin-right: auto;  /* прижимает всё остальное вправо */
}

#adminControls{
    display:none;
    align-items:center;
    gap:4px;
    min-width:0;
    flex:0 1 auto;
    justify-content:flex-end;
}

#adminControls select,
#adminControls button{
    background:rgba(255,255,255,0.08);
    color:#fff;
    border:1px solid rgba(255,255,255,0.18);
    border-radius:2px;
    font-family:'Inter',system-ui,sans-serif;
    font-size:10px;
    font-style: italic;
    font-weight:500;
    letter-spacing:0.02em;
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    transition:all 0.2s;
    vertical-align:middle;
    margin:0;
    box-sizing:border-box;
}

#adminControls button{
    height:20px;
    min-height:20px;
    padding:0 7px;
    min-width:42px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    line-height:1;
    cursor:pointer;
}

#adminControls select{
    height:20px;
    min-height:20px;
    width:72px;
    min-width:72px;
    max-width:72px;
    padding:0 16px 0 6px;
    text-align-last:center;
    line-height:18px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(4px);
}

#adminControls select:hover,
#adminControls button:hover{
    background:rgba(255,255,255,0.12);
    border-color:rgba(255,255,255,0.26);
}

#modelDock{
    margin-left:0;
    position:relative;
    flex:0 0 150px;
    width:150px;
    min-width:150px;
    max-width:150px;
}

#modelCurrent{
    display:block;
    width:100%;
    max-width:100%;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    font-family:'Inter',system-ui,sans-serif;
    font-size:11px;
    font-weight:500;
    opacity:0.68;
    text-align:right;
    padding-right:var(--dock-right-gap);
    cursor:pointer;
    letter-spacing:0.01em;
    font-style: italic;
}

#modelCurrent.admin-clickable{
    cursor:pointer;
}

#modelDropdown{
    display:none;
    position:absolute;
    bottom:100%;
    right:0;
    background:transparent;
    backdrop-filter:blur(4px);
    padding:6px 0 4px 0;
    z-index:40;
    white-space:nowrap;
    max-height:calc(100dvh - 80px);
    overflow-y:auto;
    border:none;
    width:max-content;
    max-width:360px;
    margin-bottom:6px;
}

.model-option{
    position:relative;
    padding:7px 12px 7px 10px;
    color:rgba(255,255,255,0.72);
    font-size:10px;
    cursor:pointer;
    white-space:normal;
    word-break:break-word;
    font-family:'Inter',system-ui,sans-serif;
    font-weight:500;
    font-style: italic;
    letter-spacing:0.01em;
    border:none;
    border-radius:0;
    transition:background 0.18s, color 0.18s, opacity 0.18s;
    text-align:right;
}

.model-option:hover{
    background:linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 55%, rgba(255,255,255,0.07) 100%);
    color:rgba(255,255,255,0.9);
}

.model-option.active{
    background:linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.04) 48%, rgba(255,255,255,0.1) 100%);
    color:rgba(255,255,255,0.96);
}

.model-option.active::after{
    content:'';
    position:absolute;
    top:5px;
    bottom:5px;
    right:0;
    width:1px;
    background:rgba(255,255,255,0.22);
}

.msgWrap{
    margin-bottom:4px;
}

.msgWrap.adminDeletable{
    cursor:pointer;
}

.msgWrap.adminDeletable:hover{
    outline:1px dashed rgba(255,255,255,0.18);
}

.msg{
    margin:0;
    opacity:0.28;
    letter-spacing:0.02em;
    line-height:1.45;
    word-break:break-word;
    white-space:pre-wrap;
    font-size:14px;
    font-family:'Inter',system-ui,sans-serif;
    font-style: italic;
}

.msg.assistant{
    opacity:1;
    color:#dceee1;
}

.msg.user{
    opacity:0.45;
    font-size:12px;
    color:rgba(255,255,255,0.82);
}

#fullscreenZone{
    position:fixed;
    top:5px;
    right:12px;
    width:50px;
    height:50px;
    z-index:100;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    opacity:0.3;
}

#fullscreenZone span{
    font-size:10px;
    color:rgba(255,255,255,0.2);
    font-family:'Inter',system-ui,sans-serif;
    font-weight:500;
    letter-spacing:0.04em;
    font-style: italic;
}

@media (max-width:720px){
    #bottomBar{
        gap:6px;
        align-items:center;
    }

    #pathDisplay{
        font-size:12px;
        max-width:80px;
        overflow:hidden;
    }

    #adminControls{
        gap:4px;
        justify-content:flex-end;
        overflow-x:auto;
        scrollbar-width:none;
    }

    #adminControls::-webkit-scrollbar{
        display:none;
    }

    #adminControls select,
    #adminControls button{
        font-size:9px;
    }

    #adminControls button{
        height:19px;
        min-height:19px;
        padding:0 5px;
        min-width:38px;
    }

    #adminControls select{
        height:19px;
        min-height:19px;
        width:66px;
        min-width:66px;
        max-width:66px;
        padding:0 14px 0 5px;
        line-height:17px;
    }

    #modelDock{
        flex:0 0 118px;
        width:118px;
        min-width:118px;
        max-width:118px;
    }

    #modelCurrent{
        max-width:100%;
        font-size:10px;
        padding-right:8px;
    }

    #modelDropdown{
        max-width:92vw;
    }

    .msg{
        font-size:13px;
    }

    .msg.user{
        font-size:11px;
    }
}

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-track{
    background:rgb(14,16,22);
}

::-webkit-scrollbar-thumb{
    background:rgb(42,48,68);
    border-radius:4px;
}

*{
    scrollbar-width:thin;
    scrollbar-color:rgb(42,48,68) rgb(14,16,22);
}
</style>
</head>
<body>

<div id="chatMessages"></div>
<textarea id="messageInput" rows="1" placeholder="Type message..."></textarea>
<div id="sendLabel">Send</div>

<div id="bottomBar">
  <div id="pathDisplay">~/projects/pi-ru</div>
  <div id="adminControls">
    <select id="sessionSelect"></select>
    <button id="undoBtn" type="button">undo</button>
    <button id="redoBtn" type="button">redo</
