<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pi Agent · Browser Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0b0c;
            color: #e1e5ea;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* messages container */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 10px 16px;
            border-radius: 20px;
            line-height: 1.45;
            font-size: 15px;
            word-break: break-word;
        }

        .user {
            align-self: flex-end;
            background: #2a6f8f;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant {
            align-self: flex-start;
            background: #1e1f22;
            border: 1px solid #2c2e33;
            border-bottom-left-radius: 4px;
        }

        /* model bar */
        .model-bar {
            padding: 10px 20px;
            background: #111214;
            border-top: 1px solid #2c2e33;
            border-bottom: 1px solid #2c2e33;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        .model-label {
            color: #828892;
        }

        .model-picker {
            background: #1f2125;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            transition: 0.2s;
            border: 1px solid #3a3c42;
        }

        .model-picker:hover {
            background: #2c2f35;
            border-color: #5a5e66;
        }

        /* input area */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 14px 20px;
            background: #111214;
            border-top: 1px solid #2c2e33;
        }

        .input-area input {
            flex: 1;
            background: #0d0f11;
            border: 1px solid #2c2e33;
            padding: 12px 18px;
            border-radius: 40px;
            color: #e1e5ea;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        .input-area input:focus {
            border-color: #4a6f8f;
        }

        .input-area button {
            background: #2a6f8f;
            border: none;
            color: white;
            padding: 0 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }

        .input-area button:hover {
            background: #1e5a75;
        }

        /* ----- fullscreen modal without borders, semi-transparent, blur ----- */
        .model-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 11, 12, 0.92);  /* same as body color (#0a0b0c) with opacity */
            backdrop-filter: blur(12px);
            z-index: 10000;
            overflow-y: auto;
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            /* no border, no shadow */
            border: none;
            box-shadow: none;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 12px;
            /* no border line */
            border-bottom: none;
        }

        .modal-header h2 {
            font-size: 26px;
            font-weight: 500;
            color: #e1e5ea;
            letter-spacing: -0.2px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #aaa;
            font-size: 36px;
            cursor: pointer;
            line-height: 1;
            padding: 0 10px;
            transition: 0.2s;
        }

        .modal-close:hover {
            color: white;
        }

        .provider-group {
            margin-bottom: 32px;
        }

        .provider-title {
            font-size: 18px;
            font-weight: 600;
            color: #b0b4bc;
            margin: 0 0 12px 0;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-left: 3px solid #2a6f8f;
            padding-left: 12px;
        }

        /* model buttons — no borders, clean */
        .model-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: rgba(30, 31, 34, 0.7);
            border: none;              /* no border */
            border-radius: 14px;
            color: #e1e5ea;
            padding: 14px 18px;
            margin-bottom: 10px;
            font-size: 14px;
            font-family: monospace;
            cursor: pointer;
            transition: 0.15s;
            backdrop-filter: blur(4px);
        }

        .model-btn:hover {
            background: rgba(50, 52, 58, 0.9);
            transform: translateX(3px);
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1c1f;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3c42;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="chat-messages" id="messages"></div>
<div class="model-bar">
    <span class="model-label">🤖 active model</span>
    <span class="model-picker" id="modelPicker">Loading...</span>
</div>
<div class="input-area">
    <input type="text" id="messageInput" placeholder="Ask me anything or type /model" autofocus>
    <button id="sendBtn">Send</button>
</div>

<script>
    // ---------- state ----------
    let currentProvider = 'groq';
    let currentModel = 'llama-3.1-8b-instant';
    let currentLabel = 'Llama 3.1 8B';

    // ---------- helpers ----------
    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerText = text;
        document.getElementById('messages').appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    async function fetchCurrentSession() {
        try {
            const res = await fetch('/api/session');
            if (res.ok) {
                const data = await res.json();
                currentProvider = data.provider || 'groq';
                currentModel = data.model || 'llama-3.1-8b-instant';
                currentLabel = data.label || currentModel;
                document.getElementById('modelPicker').innerText = `${currentProvider}: ${currentLabel}`;
            }
        } catch(e) {
            console.warn("cannot fetch session", e);
        }
    }

    async function loadModels() {
        const res = await fetch('/api/models');
        const models = await res.json();
        // group by provider
        const grouped = {};
        for (const m of models) {
            if (!grouped[m.provider]) grouped[m.provider] = [];
            grouped[m.provider].push(m);
        }
        return { models, grouped };
    }

    async function switchModel(provider, model, displayName) {
        try {
            const res = await fetch('/api/session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ provider, model })
            });
            if (res.ok) {
                currentProvider = provider;
                currentModel = model;
                currentLabel = displayName;
                document.getElementById('modelPicker').innerText = `${provider}: ${displayName}`;
                appendMessage('assistant', `✅ Switched to ${provider}: ${displayName}`);
                return true;
            } else {
                const err = await res.text();
                appendMessage('assistant', `❌ Failed: ${err}`);
                return false;
            }
        } catch(e) {
            appendMessage('assistant', `❌ Network error: ${e.message}`);
            return false;
        }
    }

    function showFullscreenPicker() {
        loadModels().then(({ grouped }) => {
            const modal = document.createElement('div');
            modal.className = 'model-modal';

            const header = document.createElement('div');
            header.className = 'modal-header';
            header.innerHTML = '<h2>Select model</h2><button class="modal-close">✕</button>';
            modal.appendChild(header);

            const content = document.createElement('div');
            for (const [provider, items] of Object.entries(grouped)) {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'provider-group';
                const title = document.createElement('div');
                title.className = 'provider-title';
                title.textContent = provider.toUpperCase();
                groupDiv.appendChild(title);
                for (const item of items) {
                    const btn = document.createElement('button');
                    btn.className = 'model-btn';
                    // Показываем провайдера перед именем модели
                    btn.textContent = `${provider}: ${item.name}`;
                    btn.onclick = () => {
                        switchModel(item.provider, item.model, item.name).then(() => {
                            modal.remove();
                        });
                    };
                    groupDiv.appendChild(btn);
                }
                content.appendChild(groupDiv);
            }
            modal.appendChild(content);

            // close logic
            const closeBtn = modal.querySelector('.modal-close');
            closeBtn.onclick = () => modal.remove();
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
            document.body.appendChild(modal);
        }).catch(err => {
            appendMessage('assistant', `⚠️ Could not load models: ${err.message}`);
        });
    }

    // ---------- send message ----------
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;

        appendMessage('user', text);
        input.value = '';

        // manual /model command as fallback
        if (text.startsWith('/model')) {
            const parts = text.split(/\s+/);
            if (parts.length >= 3) {
                const provider = parts[1];
                const model = parts[2];
                try {
                    const res = await fetch('/api/models');
                    const all = await res.json();
                    const found = all.find(m => m.provider === provider && m.model === model);
                    const display = found ? found.name : model;
                    await switchModel(provider, model, display);
                } catch(e) {
                    await switchModel(provider, model, model);
                }
            } else {
                appendMessage('assistant', 'Usage: /model <provider> <model_id>');
            }
            return;
        }

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: text,
                    provider: currentProvider,
                    model: currentModel
                })
            });
            const data = await res.json();
            if (data.success) {
                appendMessage('assistant', data.reply);
                if (data.changed) {
                    // optional: reload if needed
                }
                if (data.provider && data.model) {
                    currentProvider = data.provider;
                    currentModel = data.model;
                    currentLabel = data.label || currentModel;
                    document.getElementById('modelPicker').innerText = `${currentProvider}: ${currentLabel}`;
                }
            } else {
                appendMessage('assistant', `Error: ${data.error || 'unknown'}`);
            }
        } catch(e) {
            appendMessage('assistant', `Network error: ${e.message}`);
        }
    }

    // ---------- event binding ----------
    document.getElementById('modelPicker').addEventListener('click', showFullscreenPicker);
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    fetchCurrentSession();
</script>
</body>
</html>
